  - id: bta-t002
    type: fill_blank
    q: 'Task: Write a Gherkin scenario for "user with locked account cannot log
      in".'
    answer: |-
      ```gherkin
      Feature: Login
        Scenario: Locked account is rejected
          Given the user "alice" exists with status "locked"
          When she submits valid credentials to /login
          Then the response status should be 423
          And the response body should contain error code "ACCOUNT_LOCKED"
      ```
    hint: Given/When/Then declarative.
    explanation: Declarative behavior, not UI clicks; reusable steps. See [[#Gherkin]].
