lesson: accessibility-testing
tasks:
  - id: at-t001
    type: fill_blank
    q: "Fill: WCAG AA contrast ratio for normal text is _______."
    answer: 4.5:1
    hint: 1.4.3.
    explanation: Standard contrast threshold for normal text. See [[#Key WCAG
      Criteria (AA highlights)]].
  - id: at-t002
    type: fill_blank
    q: "Task: Write a Playwright test that scans the homepage with axe and asserts
      zero violations."
    answer: |-
      ```js
      import { test, expect } from '@playwright/test';
      import AxeBuilder from '@axe-core/playwright';
      test('a11y home', async ({ page }) => {
        await page.goto('/');
        const r = await new AxeBuilder({ page }).analyze();
        expect(r.violations).toEqual([]);
      });
      ```
    hint: AxeBuilder.analyze().
    explanation: Catches automated-detectable violations in CI. See [[#Playwright +
      axe Example]].
  - id: at-t003
    type: fill_blank
    q: "Fill: Built-in macOS screen reader is _______."
    answer: VoiceOver
    hint: Apple SR.
    explanation: macOS/iOS default screen reader. See [[#Testing Methods]].
