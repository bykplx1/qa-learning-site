      - D) Boundary only
    answer: 1
    hint: Class collapse.
    explanation: Reduces test count. See [[#Black-box Techniques]].
  - id: ifc-019
    type: single
    q: "Maintenance testing trigger NOT:"
    options:
      - A) Modification
      - B) Migration
      - C) Retirement
      - D) New product launch
    answer: 3
    hint: Maintenance â‰  greenfield.
    explanation: Maintenance applies to existing. See [[#Maintenance Triggers]].
  - id: ifc-020
    type: single
    q: "CTFL exam time:"
    options:
      - A) 30 min
      - B) 60 min
      - C) 90 min
      - D) 120 min
    answer: 1
