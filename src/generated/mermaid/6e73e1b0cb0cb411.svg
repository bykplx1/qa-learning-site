chart-L2-1" data-look="classic" transform="translate(140.21875, 439)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 2 — SCHEMA ASSERTION<br />ajv.compile(userSchema) → validate(res.body)<br />Catches: wrong types, missing required fields, extra fields<br />Misses: shape drift between separately-deployed services</p></span></div></foreignObject></g></g><g class="node default" id="m6e73e1b0cb0cb411-0-flowchart-L3-2" data-look="classic" transform="translate(140.21875, 783)"><rect class="basic label-container" style="" x="-130" y="-159" width="260" height="318"/><g class="label" style="" transform="translate(-100, -144)"><rect/><foreignObject width="200" height="288"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 3 — CONTRACT ASSERTION (consumer-driven)<br />Consumer publishes → Pact Broker → Provider verifies in CI<br />Catches: provider change breaks downstream consumer<br />Misses: nothing the other layers catch — this is the ceiling</p></span></div></foreignObject></g></g><g class="node default" id="m6e73e1b0cb0cb411-0-flowchart-note-6" data-look="classic" transform="translate(452.4375, 131)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Key: escalate in order.<br />Schema first, contract second,<br />on routes crossing service or team boundaries.</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="m6e73e1b0cb0cb411-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="m6e73e1b0cb0cb411-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="m6e73e1b0cb0cb411-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl(0, 0%, 88.9215686275%)" stop-opacity="1"/></linearGradient></svg>