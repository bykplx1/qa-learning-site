lesson: test-reporting
tasks:
  - id: tr-t001
    type: fill_blank
    q: "Fill: pytest CLI flag to emit JUnit XML = `--______=reports/junit.xml`."
    answer: junitxml
    hint: Built-in.
    explanation: Standard pytest reporter flag. See [[#JUnit XML (Lingua Franca)]].
  - id: tr-t002
    type: fill_blank
    q: "Task: Write a GHA step set that runs Playwright, uploads HTML report on
      failure, and posts JUnit summary as PR comment."
    answer: |-
      ```yaml
      - run: npx playwright test --reporter=junit,html
        continue-on-error: true
      - uses: dorny/test-reporter@v1
        if: always()
        with: { name: e2e, path: junit.xml, reporter: java-junit }
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: playwright-report/ }
      ```
    hint: test-reporter + upload-artifact.
    explanation: Inline summary + artifact for deep dive. See [[#CI Integration]].
  - id: tr-t003
    type: fill_blank
    q: "Fill: Allure command to build static site from raw results = `allure ______
      allure-results -o allure-report`."
    answer: generate
    hint: CLI verb.
    explanation: Compiles JSON results to HTML. See [[#Workflow]].
