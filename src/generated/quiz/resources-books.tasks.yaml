lesson: resources-books
tasks:
  - id: rb-t001
    type: fill_blank
    q: "Fill: Reading retention — apply ____ within ____ weeks or it fades."
    answer: one idea / two
    hint: 1 idea, 2 weeks.
    explanation: Application beats completion. See [[#How to Read Technical Books]].
  - id: rb-t002
    type: fill_blank
    q: "Task: Build a 12-month reading plan as a mid-level QA targeting SDET."
    answer: >-
      - Q1: *xUnit Test Patterns* + *Fluent Python*. Apply: refactor one suite
      using 5 patterns.

      - Q2: *Continuous Delivery* + *GOOS*. Apply: TDD a small service
      end-to-end with CI.

      - Q3: *Working Effectively with Legacy Code* + *SQL Performance
      Explained*. Apply: introduce seams in legacy module + tune one slow test
      query.

      - Q4: *Accelerate* + *Designing Data-Intensive Applications*. Apply:
      instrument DORA metrics in team; design integration tests for a data
      pipeline.

      - Daily: blog/newsletter (Fowler, Google Testing Blog).

      - Quarterly: 1 brown-bag teaching session per book.
    hint: Pair each book with concrete artifact.
    explanation: Application + visibility. See [[#Reading Strategy]] and [[Career-Path]].
  - id: rb-t003
    type: fill_blank
    q: "Fill: Tier 6 ISTQB-aligned — *Advanced Software Testing Vol. 2* maps to ____
      cert; written by ____."
    answer: CTAL-TM (Test Manager) / Rex Black
    hint: TM = Test Manager.
    explanation: Cert-aligned reading. See [[#Tier 6 — ISTQB-Aligned]] and
      [[03-Advanced-Test-Manager]].
