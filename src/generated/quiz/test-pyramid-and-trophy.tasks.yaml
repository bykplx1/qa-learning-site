lesson: test-pyramid
tasks:
  - id: tp-t001
    type: fill_blank
    q: "Fill: Anti-pattern with many manual + E2E and few unit tests is called
      _______."
    answer: Ice Cream Cone
    hint: Inverted pyramid.
    explanation: The ice-cream cone anti-pattern inverts the pyramid: many manual/E2E tests and few unit tests — slow, brittle, and costly.
  - id: tp-t002
    type: fill_blank
    q: 'Task: Login flow has flaky Selenium test for "wrong password shows error".
      Suggest a faster, more stable replacement layer.'
    answer: >-
      - Move check to API test: `POST /login` with bad creds → expect 401 +
      error code in body.

      - Keep one E2E for the happy login path only.
    hint: Push down.
    explanation: Logic verifiable at API layer; the UI test only needs to confirm the message renders — split concerns for stability.
  - id: tp-t003
    type: fill_blank
    q: "Fill: Microservices teams sometimes prefer the _______ shape, with thinner
      unit + E2E and a fat integration middle."
    answer: Diamond (Testing Diamond)
    hint: Integration-heavy variant.
    explanation: Microservice bugs cluster at integration boundaries, so the diamond / honeycomb shape puts more tests there than at unit level.
