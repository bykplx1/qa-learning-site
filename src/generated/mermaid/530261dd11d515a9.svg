id edge-thickness-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_L2_L3_0" data-points="W3sieCI6MTM4LCJ5Ijo3NjZ9LHsieCI6MTM4LCJ5Ijo3OTF9LHsieCI6MTM4LCJ5Ijo4MTZ9XQ==" data-look="classic" marker-end="url(#m530261dd11d515a9-0_flowchart-v2-pointEnd)"/><path d="M138,1206L138,1210.167C138,1214.333,138,1222.667,138,1230.333C138,1238,138,1245,138,1248.5L138,1252" id="m530261dd11d515a9-0-L_L3_L4_0" class="edge-thickness-normal edge-pattern-solid edge-thickness-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_L3_L4_0" data-points="W3sieCI6MTM4LCJ5IjoxMjA2fSx7IngiOjEzOCwieSI6MTIzMX0seyJ4IjoxMzgsInkiOjEyNTZ9XQ==" data-look="classic" marker-end="url(#m530261dd11d515a9-0_flowchart-v2-pointEnd)"/></g><g class="edgeLabels"><g class="edgeLabel"><g class="label" data-id="L_L1_L2_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_L2_L3_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_L3_L4_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default" id="m530261dd11d515a9-0-flowchart-L1-0" data-look="classic" transform="translate(138, 191)"><rect class="basic label-container" style="" x="-130" y="-183" width="260" height="366"/><g class="label" style="" transform="translate(-100, -168)"><rect/><foreignObject width="200" height="336"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 1: Automated (axe-core / Lighthouse / pa11y)<br />Coverage: ~30–40% of violations<br />Catches: missing alt text · low contrast · missing form labels<br />  ARIA misuse · empty buttons · missing page title<br />Misses: keyboard traps · focus order logic · screen-reader narrative<br />Cost: near-zero per run once wired into CI</p></span></div></foreignObject></g></g><g class="node default" id="m530261dd11d515a9-0-flowchart-L2-1" data-look="classic" transform="translate(138, 595)"><rect class="basic label-container" style="" x="-130" y="-171" width="260" height="342"/><g class="label" style="" transform="translate(-100, -156)"><rect/><foreignObject width="200" height="312"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 2: Keyboard-only manual pass<br />Coverage: adds ~20–25%<br />Catches: invisible focus · illogical tab order · keyboard trap<br />  missing skip link · custom widget keyboard gaps<br />Misses: screen-reader-only semantics · live-region announcements<br />Cost: 1–4 hrs for a primary user flow</p></span></div></foreignObject></g></g><g class="node default" id="m530261dd11d515a9-0-flowchart-L3-2" data-look="classic" transform="translate(138, 1011)"><rect class="basic label-container" style="" x="-130" y="-195" width="260" height="390"/><g class="label" style="" transform="translate(-100, -180)"><rect/><foreignObject width="200" height="360"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 3: Screen-reader manual pass (NVDA / VoiceOver / TalkBack)<br />Coverage: adds ~20–25%<br />Catches: broken reading order · silent dynamic updates · bad ARIA names<br />  focus-management regressions after SPA route changes<br />Misses: cognitive accessibility · complex workflow fatigue<br />Cost: 4–8 hrs; pair with a blind tester when possible</p></span></div></foreignObject></g></g><g class="node default" id="m530261dd11d515a9-0-flowchart-L4-3" data-look="classic" transform="translate(138, 1427)"><rect class="basic label-container" style="" x="-130" y="-171" width="260" height="342"/><g class="label" style="" transform="translate(-100, -156)"><rect/><foreignObject width="200" height="312"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LAYER 4: Real-user testing with disabled users<br />Coverage: ground truth — catches what tools and proxies cannot<br />Catches: cognitive load · real assistive-tech configurations<br />  workflow paths no sighted QA engineer anticipates<br />Cost: recruiting + facilitation; limited frequency</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="m530261dd11d515a9-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="m530261dd11d515a9-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="m530261dd11d515a9-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl(0, 0%, 88.9215686275%)" stop-opacity="1"/></linearGradient></svg>