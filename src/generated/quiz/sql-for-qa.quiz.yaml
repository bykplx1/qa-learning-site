lesson: sql-for-qa
questions:
  - id: sfq-001
    type: single
    q: "Logical SQL processing order starts with:"
    options:
      - A) SELECT
      - B) FROM
      - C) WHERE
      - D) ORDER BY
    answer: 1
    hint: Source first.
    explanation: Engine resolves source tables before filter/projection. See
      [[#SELECT Skeleton]].
  - id: sfq-002
    type: single
    q: "`WHERE` vs `HAVING`:"
    options:
      - A) Same
      - B) WHERE pre-aggregate, HAVING post-aggregate
      - C) WHERE only on joins
      - D) HAVING is faster
    answer: 1
    hint: Filter timing.
    explanation: WHERE filters rows; HAVING filters groups. See [[#Aggregates]].
  - id: sfq-003
    type: single
    q: "Find users with no orders:"
    options:
      - A) INNER JOIN
      - B) LEFT JOIN orders + WHERE orders.id IS NULL
      - C) CROSS JOIN
      - D) RIGHT JOIN
    answer: 1
    hint: Orphans pattern.
    explanation: LEFT keeps all users; NULL on right = no match. See [[#JOIN Types]].
  - id: sfq-004
    type: single
    q: "`NULL = NULL` evaluates to:"
    options:
      - A) TRUE
      - B) FALSE
      - C) UNKNOWN
      - D) Error
    answer: 2
    hint: Three-valued logic.
    explanation: Use `IS NULL`/`IS NOT NULL` for null comparisons. See [[#NULL Handling]].
  - id: sfq-005
    type: single
    q: "Best column type for money:"
    options:
      - A) FLOAT
      - B) DOUBLE
      - C) NUMERIC/DECIMAL
      - D) INT only
    answer: 2
    hint: Exact precision.
    explanation: Floats lose precision; NUMERIC stores exact decimals. See [[#Common
      Bugs Found]].
  - id: sfq-006
    type: single
    q: "Find duplicate emails:"
    options:
      - A) `SELECT DISTINCT email`
      - B) `GROUP BY email HAVING COUNT(*) > 1`
      - C) `WHERE email = email`
      - D) `JOIN ON email`
    answer: 1
    hint: Group + filter.
    explanation: Reveals values appearing more than once. See [[#Useful Snippets]].
  - id: sfq-007
    type: single
    q: "CTE benefit over subquery:"
    options:
      - A) Faster always
      - B) Readability + reuse within query
      - C) Auto-indexed
      - D) Required syntax
    answer: 1
    hint: Named, top-down.
    explanation: Easier to read; can be referenced multiple times. See [[#Subqueries
      + CTEs]].
  - id: sfq-008
    type: single
    q: "Default Postgres isolation level:"
    options:
      - A) READ UNCOMMITTED
      - B) READ COMMITTED
      - C) REPEATABLE READ
      - D) SERIALIZABLE
    answer: 1
    hint: Common default.
    explanation: READ COMMITTED balances consistency + performance. See [[#Transactions]].
  - id: sfq-009
    type: single
    q: "Composite index `(a, b)` accelerates:"
    options:
      - A) Filter on `b` only
      - B) Filter on `a`, or `a AND b`
      - C) Filter on any column
      - D) Joins only
    answer: 1
    hint: Leftmost prefix rule.
    explanation: Index usable when leftmost columns are in predicate. See [[#Indexes
      (testing perspective)]].
  - id: sfq-010
    type: single
    q: "`EXPLAIN ANALYZE` purpose:"
    options:
      - A) Format query
      - B) Show actual query plan + timing
      - C) Run faster
      - D) Validate syntax
    answer: 1
    hint: Plan + measurements.
    explanation: Reveals scans, joins, row counts to diagnose perf. See [[#EXPLAIN
      (read query plan)]].
  - id: sfq-011
    type: single
    q: "Wrap risky DELETE in tests with:"
    options:
      - A) `LIMIT 0`
      - B) `BEGIN; DELETE ...; ROLLBACK;`
      - C) `EXPLAIN`
      - D) `LOCK TABLE`
    answer: 1
    hint: Transaction preview.
    explanation: Lets you inspect effect, then undo. See [[#CRUD]].
  - id: sfq-012
    type: single
    q: "Aggregate that includes NULLs:"
    options:
      - A) SUM
      - B) AVG
      - C) COUNT(*)
      - D) MAX
    answer: 2
    hint: "`*` counts rows."
    explanation: "`COUNT(col)` skips nulls; `COUNT(*)` counts all rows. See [[#NULL
      Handling]]."
  - id: sfq-013
    type: single
    q: "Window function purpose:"
    options:
      - A) Sort window
      - B) Compute per-row over a partition without collapsing rows
      - C) Limit results
      - D) Indexing hint
    answer: 1
    hint: Aggregates that keep rows.
    explanation: RANK/ROW_NUMBER/SUM OVER add columns per row. See [[#Window Functions]].
  - id: sfq-014
    type: single
    q: "CROSS JOIN result size:"
    options:
      - A) min(left, right)
      - B) max(left, right)
      - C) left Ã— right (cartesian)
      - D) sum
    answer: 2
    hint: Cartesian.
    explanation: Every left row paired with every right row. See [[#JOIN Types]].
  - id: sfq-015
    type: single
    q: "Diff two tables (rows in A not in B):"
    options:
      - A) UNION
      - B) EXCEPT (or MINUS)
      - C) INTERSECT
      - D) JOIN
    answer: 1
    hint: Set difference.
    explanation: Used for env-vs-env or before/after diffs. See [[#QA-Specific Patterns]].
  - id: sfq-016
    type: single
    q: "N+1 query symptom:"
    options:
      - A) Single fast query
      - B) Loop fetches related rows individually
      - C) Index scan
      - D) Schema migration
    answer: 1
    hint: App calls DB per item.
    explanation: Use single JOIN or batch query instead. See [[#Common Bugs Found]].
  - id: sfq-017
    type: single
    q: "`COALESCE(a, b, c)`:"
    options:
      - A) Concat
      - B) First non-null
      - C) Sum
      - D) Average
    answer: 1
    hint: Fallback chain.
    explanation: Default value substitution for nulls. See [[#NULL Handling]].
  - id: sfq-018
    type: single
    q: "Top 3 events per user use:"
    options:
      - A) ORDER BY + LIMIT 3 (returns global top 3)
      - B) ROW_NUMBER OVER (PARTITION BY user_id ...) + WHERE rn <= 3
      - C) DISTINCT
      - D) GROUP BY user_id
    answer: 1
    hint: Per-group top N.
    explanation: Window partition gives per-user ranking. See [[#Useful Snippets]].
  - id: sfq-019
    type: single
    q: "`IS NOT DISTINCT FROM` differs from `=` because:"
    options:
      - A) Faster
      - B) Treats NULL = NULL as TRUE
      - C) Case-insensitive
      - D) Range compare
    answer: 1
    hint: Null-safe equality.
    explanation: Useful when nulls represent equal "missing" values. See [[#Useful
      Snippets]].
  - id: sfq-020
    type: single
    q: "Forgetting WHERE on UPDATE causes:"
    options:
      - A) Compile error
      - B) Mass row update across whole table
      - C) No-op
      - D) Slow query
    answer: 1
    hint: Affects all rows.
    explanation: >-
      Common destructive bug; always preview in transaction. See [[#Common Bugs
      Found]].


      ---
