lesson: mobile-testing
tasks:
  - id: mt-t001
    type: fill_blank
    q: "Fill: Tool that throttles network conditions during testing is called
      _______."
    answer: Charles (or Network Link Conditioner / mitmproxy)
    hint: Proxy throttler.
    explanation: Charles Proxy / Network Link Conditioner simulates real-world network conditions (throttling, packet loss) for mobile testing.
  - id: mt-t002
    type: fill_blank
    q: "Task: List 3 interrupt scenarios you must cover during mobile testing."
    answer: |-
      - Incoming call during a flow.
      - Push notification during checkout.
      - Low battery / power save mode toggle.
    hint: Real-world events.
    explanation: Interrupt testing verifies resilience to OS-level events like calls, notifications, and power changes.
  - id: mt-t003
    type: fill_blank
    q: "Fill: Cross-platform mobile automation tool using WebDriver protocol is
      _______."
    answer: Appium
    hint: WebDriver mobile.
    explanation: Appium is the de facto cross-platform mobile automation tool using the WebDriver protocol.
