lesson: eval-design
questions:
  - id: ed-001
    type: single
    difficulty: easy
    q: "An eval is best described as:"
    options:
      - A) A unit test for a deterministic function
      - B) A test suite plus a graded outcome on a dataset, for a system whose outputs cannot be exactly predicted
      - C) A UI screenshot comparison
      - D) A load test for LLM inference throughput
    answer: 1
    hint: |-
      Integration test equivalent for LLM systems.
    explanation: |-
      An eval measures system behaviour over a representative input distribution, grading outputs rather than asserting exact matches. It is the LLM-era equivalent of the integration test.

  - id: ed-002
    type: single
    difficulty: medium
    q: "The three eval modalities are:"
    options:
      - A) Fast, medium, slow
      - B) Automated, manual, hybrid
      - C) Rule-based, reference-based, model-graded
      - D) Unit, integration, E2E
    answer: 2
    hint: Each handles a different output type.
    explanation: |-
      Rule-based (regex, JSON schema, must-contain), reference-based (exact match, F1, BERTScore against known-correct answers), and model-graded (an LLM judge applies a written rubric). None can replace the others — they handle different output classes.

  - id: ed-003
    type: single
    difficulty: easy
    q: "Rule-based evals are best suited for outputs that:"
    options:
      - A) Require human judgment to evaluate quality
      - B) Have verifiable structural properties — e.g. valid JSON, must contain a specific phrase, correct regex match
      - C) Are inherently subjective
      - D) Require semantic comparison to a reference
    answer: 1
    hint: Checkable without another model.
    explanation: |-
      Rule-based evals work on outputs with objective structural properties: the output must be valid JSON, must contain a required field, must match a regex pattern, must not contain forbidden terms. These are cheap, deterministic, and fast.

  - id: ed-004
    type: single
    difficulty: medium
    q: "LLM-as-judge (model-graded) evals are needed when:"
    options:
      - A) The output is a number
      - B) The output is a JSON object
      - C) The output quality requires judgment that cannot be expressed as a rule or a reference match — e.g. helpfulness, tone, correctness of an explanation
      - D) The output always matches a known-good reference exactly
    answer: 2
    hint: |-
      When a rubric is needed that only a model (or human) can apply.
    explanation: |-
      LLM-as-judge is appropriate when quality cannot be measured with a deterministic rule or an exact reference. A rubric — "does the answer correctly explain the concept without hallucinating?" — requires the evaluating intelligence of another model (or a human).

  - id: ed-005
    type: single
    difficulty: medium
    q: "A golden dataset in eval design is:"
    options:
      - A) The largest possible dataset of user queries
      - B) A curated, representative set of inputs with known-good outputs, used as the reference for regression
      - C) A synthetic dataset generated by an LLM
      - D) A dataset of only edge cases
    answer: 1
    hint: |-
      Small, curated, representative — the ground truth for regression.
    explanation: |-
      A golden dataset is a hand-curated set of inputs with verified correct outputs. It is the ground truth for regression — when a model or prompt changes, running evals on the golden dataset tells you whether quality regressed.

  - id: ed-006
    type: single
    difficulty: hard
    q: "Why should evals be run as regression suites in CI (eval-in-CI)?"
    options:
      - A) CI pipelines have faster hardware for model inference
      - B) Prompt and model changes can silently regress quality — eval-in-CI gates changes the same way unit tests gate code changes
      - C) CI is the only place where LLMs can be called
      - D) Evals are too expensive to run locally
    answer: 1
    hint: |-
      A prompt change without an eval run is a code change without tests.
    explanation: |-
      Prompts are production code. A prompt change can degrade answer quality, increase refusal rate, or change output format in ways invisible to functional tests. Running evals in CI on every prompt or model change provides the same regression safety net that unit tests provide for code.

  - id: ed-007
    type: single
    difficulty: medium
    q: "Non-determinism in LLM outputs affects eval design by requiring:"
    options:
      - A) Using exact-match assertions for all evals
      - B) Running each eval input multiple times and aggregating results — or using stochastic-aware metrics and confidence intervals
      - C) Setting temperature=0 to eliminate non-determinism
      - D) Avoiding evals entirely for generative tasks
    answer: 1
    hint: |-
      One run is not a sample — LLMs are stochastic.
    explanation: |-
      LLM outputs vary across runs even for the same input. A single eval run measures one sample from the output distribution. Multiple runs with aggregated pass rates (or statistical confidence intervals) give a more reliable signal. temperature=0 is greedy decoding, not true determinism.

  - id: ed-008
    type: single
    difficulty: hard
    q: "The meta-eval problem in LLM-as-judge is:"
    options:
      - A) LLM judges are too slow for production use
      - B) The judge model's biases and failure modes must themselves be evaluated — the judge needs validation
      - C) LLM judges always agree with human raters
      - D) Meta-evals require more data than available
    answer: 1
    hint: Who judges the judge?
    explanation: |-
      LLM-as-judge introduces a second system with its own biases (position bias, verbosity bias, self-serving bias). The judge's ratings must be validated against human ground truth to know whether the judge is reliable. This is the meta-eval: evaluating the evaluator.

  - id: ed-009
    type: single
    difficulty: medium
    q: "BERTScore is a reference-based eval metric that measures:"
    options:
      - A) Exact word overlap between candidate and reference
      - B) Semantic similarity between candidate and reference using BERT embeddings
      - C) The length difference between candidate and reference
      - D) Whether the candidate is valid JSON
    answer: 1
    hint: |-
      Embedding-based — captures semantic meaning, not just word overlap.
    explanation: |-
      BERTScore computes semantic similarity by comparing the token embeddings of the candidate and reference outputs. It captures paraphrases and semantic equivalences that exact-match metrics (BLEU, exact string match) miss.

  - id: ed-010
    type: single
    difficulty: hard
    q: "Why is a single aggregate end-to-end accuracy metric insufficient for an LLM system eval?"
    options:
      - A) End-to-end accuracy is too expensive to compute
      - B) A single aggregate hides which component (retrieval, generation, tool call) is responsible for failures — each stage needs its own metric
      - C) End-to-end accuracy is not a valid metric for generative systems
      - D) Aggregate metrics require too large a dataset
    answer: 1
    hint: You cannot fix what you cannot localise.
    explanation: |-
      A single end-to-end score can mask component-level failures. A RAG system with 60% end-to-end accuracy might have 95% retrieval precision but 60% generation faithfulness — or vice versa. Without per-stage metrics, you cannot identify which stage to fix.
