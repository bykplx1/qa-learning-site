lesson: testing-principles
tasks:
  - id: tp-t001
    type: fill_blank
    q: 'Fill: The principle "_______" states that 80% of defects come from 20% of
      modules.'
    answer: Defect clustering
    hint: Pareto.
    explanation: Pareto distribution observed across many codebases. Drives focus on
      hot spots. See [[#The 7 Principles]] item 4.
  - id: tp-t002
    type: fill_blank
    q: 'Fill: Testing too late violates the principle of "_______ testing."'
    answer: Early
    hint: Shift-left.
    explanation: Late detection multiplies cost. Early testing principle pushes
      activities into requirements/design. See [[#The 7 Principles]] item 3.
  - id: tp-t003
    type: fill_blank
    q: "Task: List 3 concrete actions to combat pesticide paradox in your regression
      suite."
    answer: |-
      1. Review and refresh test data quarterly
      2. Add exploratory sessions targeting recent code changes
      3. Mutate existing tests (boundary shifts, new equivalence classes)
    hint: Vary, add, prune.
    explanation: Pesticide paradox demands variation, not repetition. Each action
      introduces new coverage angle. See [[#The 7 Principles]] item 5.
