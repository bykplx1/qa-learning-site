    hint: Three pillars.
    explanation: Proves design + automation + collaboration. See [[#Interview Loop
      (Senior QA)]].
  - id: cp-015
    type: single
    q: "Quality Coach role belongs to:"
    options:
      - A) Strict gatekeeper
      - B) Modern Testing â€” coach team to own quality
      - C) Manual-only
      - D) Director track
    answer: 1
    hint: Enabler.
    explanation: Aligns with Modern Testing. See [[#Specialist Branches]].
  - id: cp-016
    type: single
    q: "Premium niche specialty:"
    options:
      - A) Manual scripting
      - B) Performance / security
      - C) Email writing
      - D) Documentation
    answer: 1
    hint: Scarcer skill.
    explanation: Higher market rate. See [[#Compensation Levers]].
  - id: cp-017
    type: single
    q: "Portfolio item ranking:"
    options:
      - A) Big private project
      - B) Small public artifact (repo, blog, talk)
      - C) Resume bullets
      - D) Internal docs
    answer: 1
    hint: Visibility.
    explanation: Verifiable signal. See [[#Building a Portfolio]].
  - id: cp-018
    type: single
    q: "Manual-only stagnation risk:"
    options:
      - A) Higher salary
