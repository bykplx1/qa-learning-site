lesson: mobile-testing-overview
questions:
  - id: mt-001
    type: single
    difficulty: easy
    q: "Espresso targets:"
    options:
      - A) iOS
      - B) Android native
      - C) Web
      - D) Flutter
    answer: 1
    hint: Google.
    explanation: Espresso is Android native UI test framework.
  - id: mt-002
    type: single
    difficulty: easy
    q: "XCUITest is for:"
    options:
      - A) Android
      - B) iOS native
      - C) Cross-platform
      - D) PWA
    answer: 1
    hint: Apple.
    explanation: Apple's iOS UI test framework.
  - id: mt-003
    type: single
    difficulty: easy
    q: "Appium protocol:"
    options:
      - A) JDBC
      - B) WebDriver / W3C
      - C) gRPC
      - D) GraphQL
    answer: 1
    hint: Selenium-like.
    explanation: Appium speaks WebDriver protocol.
  - id: mt-004
    type: single
    difficulty: easy
    q: "Best stable locator:"
    options:
      - A) XPath full
      - B) Accessibility ID
      - C) Pixel coordinates
      - D) Index
    answer: 1
    hint: Cross-platform stable.
    explanation: Accessibility IDs survive layout changes.
  - id: mt-005
    type: single
    difficulty: easy
    q: "Detox primarily for:"
    options:
      - A) Native iOS
      - B) React Native
      - C) Cordova
      - D) Flutter
    answer: 1
    hint: RN gray-box.
    explanation: Detox built for React Native testing.
  - id: mt-006
    type: single
    difficulty: easy
    q: "Hybrid app uses:"
    options:
      - A) Native code only
      - B) WebView inside native shell
      - C) Browser only
      - D) Server-side render
    answer: 1
    hint: Cordova/Capacitor.
    explanation: Hybrid wraps web UI in native container.
  - id: mt-007
    type: single
    difficulty: easy
    q: "Interrupt test example:"
    options:
      - A) Long input
      - B) Incoming call during purchase flow
      - C) Empty form
      - D) DB down
    answer: 1
    hint: External event.
    explanation: Interrupts test app handles real-world events.
  - id: mt-008
    type: single
    difficulty: medium
    q: "Cold start means:"
    options:
      - A) App resumed from background
      - B) App launched from terminated state
      - C) Device boot
      - D) Cache hit
    answer: 1
    hint: Fresh process.
    explanation: Cold start = full launch from zero.
  - id: mt-009
    type: single
    difficulty: medium
    q: "Frame budget at 60fps:"
    options:
      - A) 33ms
      - B) 16ms
      - C) 100ms
      - D) 1ms
    answer: 1
    hint: 1000/60.
    explanation: ~16.7ms per frame for 60fps.
  - id: mt-010
    type: single
    difficulty: medium
    q: "Cloud device farm example:"
    options:
      - A) BrowserStack / Sauce / Firebase Test Lab
      - B) Postman
      - C) JMeter
      - D) Wireshark
    answer: 0
    hint: Real device cloud.
    explanation: Run tests on hosted real devices.
  - id: mt-011
    type: single
    difficulty: medium
    q: "Maestro is:"
    options:
      - A) DB tool
      - B) YAML mobile flow runner
      - C) IDE
      - D) CDN
    answer: 1
    hint: Declarative mobile.
    explanation: Maestro defines flows in YAML, no code.
  - id: mt-012
    type: single
    difficulty: medium
    q: "RTL testing checks:"
    options:
      - A) Right-to-left language layout
      - B) Round-trip latency
      - C) Real-time logs
      - D) Retry logic
    answer: 0
    hint: Arabic/Hebrew.
    explanation: Layout mirroring for RTL languages.
  - id: mt-013
    type: single
    difficulty: medium
    q: "Foldable / large screen test verifies:"
    options:
      - A) Layout adapts to fold/unfold + density
      - B) Audio
      - C) DB indexes
      - D) Cookies
    answer: 0
    hint: Continuity.
    explanation: Foldables require layout adaptation.
  - id: mt-014
    type: single
    difficulty: medium
    q: "Deep link bug surfaces when:"
    options:
      - A) Tap link doesn't reach correct screen
      - B) Color wrong
      - C) Battery low
      - D) Slow start
    answer: 0
    hint: Routing.
    explanation: Deep link testing verifies URL/intent → screen.
  - id: mt-015
    type: single
    difficulty: medium
    q: "Permissions test should:"
    options:
      - A) Skip
      - B) Test grant + deny + revoke flows
      - C) Always grant
      - D) Disable check
    answer: 1
    hint: All paths.
    explanation: Apps must handle deny gracefully.
  - id: mt-016
    type: single
    difficulty: hard
    q: "Emulator vs real device:"
    options:
      - A) Same
      - B) Emulator faster dev loop, real device required for hardware-sensitive
      - C) Real always better
      - D) Emulator only
    answer: 1
    hint: Trade-off.
    explanation: Emulator misses sensors, OEM, GPU quirks.
  - id: mt-017
    type: single
    difficulty: hard
    q: "Network condition tool:"
    options:
      - A) Charles / Network Link Conditioner
      - B) JMeter
      - C) Lighthouse
      - D) Pact
    answer: 0
    hint: Throttle traffic.
    explanation: Charles throttles bandwidth + latency for testing.
  - id: mt-018
    type: single
    difficulty: hard
    q: "App lifecycle states include:"
    options:
      - A) Foreground / Background / Killed
      - B) Logged in / out
      - C) Public / Private
      - D) Sync / Async
    answer: 0
    hint: OS lifecycle.
    explanation: Lifecycle = states OS transitions app through.
  - id: mt-019
    type: single
    difficulty: hard
    q: "Push notification test step:"
    options:
      - A) Verify delivery + deep link tap → correct screen + state
      - B) Just send
      - C) Manual screenshot only
      - D) Skip
    answer: 0
    hint: End-to-end.
    explanation: Cover delivery, tap action, navigation, state.
  - id: mt-020
    type: single
    difficulty: hard
    q: "React Native app testing:"
    options:
      - A) XCUITest only
      - B) Espresso only
      - C) Detox or Appium
      - D) PowerShell
    answer: 2
    hint: RN-aware.
    explanation: Detox best for RN gray-box; Appium also works.
