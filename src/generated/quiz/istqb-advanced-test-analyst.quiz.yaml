lesson: istqb-advanced-test-analyst
questions:
  - id: iata-001
    type: single
    q: "EP minimum coverage:"
    options:
      - A) All values
      - B) One valid + one invalid representative per partition
      - C) Boundaries only
      - D) Random
    answer: 1
    hint: Class collapse.
    explanation: Class equivalence assumption. See [[#Specification-based
      (Black-box) Techniques (deep)]].
  - id: iata-002
    type: single
    q: State transition 1-switch coverage =
    options:
      - A) Each transition once
      - B) Each pair of consecutive transitions
      - C) All states
      - D) All events
    answer: 1
    hint: Pairwise transitions.
    explanation: 1-switch tests sequences of two transitions. See [[#State
      Transition Testing]].
  - id: iata-003
    type: single
    q: "Decision table with 5 binary conditions:"
    options:
      - A) 10 rules
      - B) 25 rules
      - C) 32 rules
      - D) 5 rules
    answer: 2
    hint: 2^5.
    explanation: 32 combinations before collapse. See [[#Decision Tables]].
  - id: iata-004
    type: single
    q: "Pairwise testing covers:"
    options:
      - A) Every combination
      - B) Every pair of parameter values
      - C) Random subset
      - D) Boundary only
    answer: 1
    hint: All-pairs.
    explanation: Pairwise = each pair once. See [[#Pairwise / Combinatorial]].
  - id: iata-005
    type: single
    q: "Severity vs Priority:"
    options:
      - A) Same
      - B) Severity = technical impact; Priority = business urgency
      - C) Severity is business
      - D) Priority is technical
    answer: 1
    hint: Technical vs business.
    explanation: Distinct dimensions. See [[#Defect Reporting (TA Lens)]].
  - id: iata-006
    type: single
    q: "WCAG 4 principles:"
    options:
      - A) POUR (Perceivable, Operable, Understandable, Robust)
      - B) RACI
      - C) SMART
      - D) ACID
    answer: 0
    hint: Accessibility.
    explanation: Mnemonic for WCAG. See [[#Accessibility (TA scope)]].
  - id: iata-007
    type: single
    q: "ISO 25010 functional suitability sub-char:"
    options:
      - A) Reliability
      - B) Functional correctness, completeness, appropriateness
      - C) Performance
      - D) Security
    answer: 1
    hint: Three sub-chars.
    explanation: Functional suitability = correctness/completeness/appropriateness.
      See [[#Quality Characteristics for TA (ISO 25010)]].
  - id: iata-008
    type: single
    q: "Cause-effect graph output:"
    options:
      - A) Random tests
      - B) Minimal test set covering causes & effects
      - C) UML
      - D) Code
    answer: 1
    hint: Logic graph.
    explanation: Reduces test set vs decision table. See [[#Cause-Effect Graphing]].
  - id: iata-009
    type: single
    q: "Best for 8-parameter config testing:"
    options:
      - A) Full combinations 2^8
      - B) Pairwise / classification tree
      - C) Random
      - D) Boundary only
    answer: 1
    hint: Combinatorial reduction.
    explanation: Pairwise scales. See [[#Pairwise / Combinatorial]].
  - id: iata-010
    type: single
    q: "Use case testing covers:"
    options:
      - A) Code paths
      - B) Main, alternative, exception flows
      - C) Boundaries
      - D) State only
    answer: 1
    hint: Actor flows.
    explanation: Standard use-case structure. See [[#Use-Case Testing]].
  - id: iata-011
    type: single
    q: "Defect taxonomy benefit:"
    options:
      - A) None
      - B) Drives test design from historic defect categories
      - C) Replaces reviews
      - D) Creates bugs
    answer: 1
    hint: Historic guidance.
    explanation: Past patterns predict new defects. See [[#Defect-based Techniques]].
  - id: iata-012
    type: single
    q: Charter-based exploratory =
    options:
      - A) Random clicking
      - B) Time-boxed mission with a written charter
      - C) Scripted regression
      - D) Static analysis
    answer: 1
    hint: Mission + box.
    explanation: Session-based test mgmt. See [[#Experience-based Techniques]].
  - id: iata-013
    type: single
    q: "Reqs review checklist NOT include:"
    options:
      - A) Testability
      - B) Ambiguity
      - C) Aesthetics of UI mockup
      - D) Completeness
    answer: 2
    hint: Wrong artifact.
    explanation: Aesthetics is design review, not reqs. See [[#Reviews from TA
      Perspective]].
  - id: iata-014
    type: single
    q: "SUS score evaluates:"
    options:
      - A) Performance
      - B) Usability via 10-item Likert questionnaire
      - C) Coverage
      - D) Security
    answer: 1
    hint: System Usability Scale.
    explanation: Standard usability metric. See [[#Usability Testing (TA scope)]].
  - id: iata-015
    type: single
    q: "WCAG level for legal compliance often required:"
    options:
      - A) A
      - B) AA
      - C) AAA
      - D) None
    answer: 1
    hint: Standard target.
    explanation: AA most regs require. See [[#Accessibility (TA scope)]].
  - id: iata-016
    type: single
    q: "Classification tree purpose:"
    options:
      - A) Boundary tests
      - B) Hierarchical input decomposition + combinatorial selection
      - C) State diagram
      - D) Code coverage
    answer: 1
    hint: Tree of partitions.
    explanation: Visual aid for combinatorial test design. See [[#Classification Tree]].
  - id: iata-017
    type: single
    q: 'Best technique for "Discount logic with 4 conditions":'
    options:
      - A) State transition
      - B) Decision table
      - C) Pairwise
      - D) Boundary
    answer: 1
    hint: Combinations of conditions.
    explanation: Decision table fits combinational rules. See [[#Choosing Technique]].
  - id: iata-018
    type: single
    q: "Defect reporting must include:"
    options:
      - A) Salary expectations
      - B) Steps, expected, actual, env, severity
      - C) Tool license
      - D) Roadmap
    answer: 1
    hint: Repro essentials.
    explanation: Standard fields for triage. See [[#Defect Reporting (TA Lens)]].
  - id: iata-019
    type: single
    q: Boundary off-by-one =
    options:
      - A) Type error
      - B) Inclusive/exclusive boundary mistake (e.g., < vs â‰¤)
      - C) Floating-point
      - D) Race condition
    answer: 1
    hint: Comparison op.
    explanation: Classic BVA target. See [[#Boundary Value Analysis (BVA)]].
  - id: iata-020
    type: single
    q: "ISO version for current quality model:"
    options:
      - A) ISO 9126
      - B) ISO 25010
      - C) ISO 27001
      - D) ISO 29119
    answer: 1
    hint: Replaced 9126.
    explanation: |-
      25010 is current. See [[#Quality Characteristics for TA (ISO 25010)]].

      ---
