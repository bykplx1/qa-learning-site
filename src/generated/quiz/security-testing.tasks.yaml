lesson: security-testing
tasks:
  - id: st-t001
    type: fill_blank
    q: "Fill: Vulnerability where attacker forces server to fetch arbitrary URL is
      _______."
    answer: SSRF (Server-Side Request Forgery)
    hint: Server-side.
    explanation: SSRF = Server makes an outbound request on the attacker's behalf (OWASP Top 10 2021 #10).
  - id: st-t002
    type: fill_blank
    q: "Task: List 3 HTTP response headers you'd verify in a security test of a web
      app."
    answer: |-
      - `Strict-Transport-Security`
      - `Content-Security-Policy`
      - `X-Content-Type-Options: nosniff`
    hint: Hardening headers.
    explanation: HSTS mitigates downgrade attacks; CSP mitigates XSS; X-Content-Type-Options prevents MIME sniffing.
  - id: st-t003
    type: fill_blank
    q: "Fill: Threat modeling acronym is _______."
    answer: STRIDE
    hint: Six categories.
    explanation: STRIDE classifies threats into Spoofing, Tampering, Repudiation, Information disclosure, DoS, Elevation of privilege.
