lesson: unit-integration-e2e-boundaries
questions:
  - id: tl-001
    type: single
    difficulty: easy
    q: Which level is owned primarily by developers?
    options:
      - A) Unit
      - B) System
      - C) UAT
      - D) Beta
    answer: 0
    hint: Smallest unit, closest to code.
    explanation: Unit tests live with code; devs write/own.
  - id: tl-002
    type: single
    difficulty: easy
    q: "UAT primarily verifies:"
    options:
      - A) Code coverage
      - B) Business requirements satisfied
      - C) Compiler errors
      - D) Memory leaks
    answer: 1
    hint: User Acceptance.
    explanation: UAT signoff confirms business needs met from user perspective.
  - id: tl-003
    type: single
    difficulty: easy
    q: "Big-bang integration means:"
    options:
      - A) Deploy on release day
      - B) Combine all modules at once and test
      - C) Stress test
      - D) Production push
    answer: 1
    hint: All together strategy.
    explanation: Big-bang = integrate all at once; risky because failures hard to isolate.
  - id: tl-004
    type: single
    difficulty: easy
    q: "Test pyramid suggests most tests should be:"
    options:
      - A) UI
      - B) Unit
      - C) Manual
      - D) Acceptance
    answer: 1
    hint: Wide base.
    explanation: Pyramid base is widest = most tests = unit. Fast + cheap.
  - id: tl-005
    type: single
    difficulty: easy
    q: "Top-down integration uses:"
    options:
      - A) Drivers
      - B) Stubs
      - C) Mocks of UI
      - D) Production data
    answer: 1
    hint: Lower modules not ready â†’ fake them.
    explanation: Top-down tests upper modules first; lower not yet built â†’ use stubs.
  - id: tl-006
    type: single
    difficulty: easy
    q: "Bottom-up integration uses:"
    options:
      - A) Stubs
      - B) Drivers
      - C) Spies
      - D) Real users
    answer: 1
    hint: Caller not ready â†’ simulate.
    explanation: Bottom-up tests lower modules first; callers not built â†’ use drivers.
  - id: tl-007
    type: single
    difficulty: easy
    q: "Alpha vs Beta:"
    options:
      - A) Alpha external, Beta internal
      - B) Alpha internal site, Beta external real users
      - C) Same thing
      - D) Alpha is automated only
    answer: 1
    hint: "Greek alphabet order: in then out."
    explanation: Alpha runs at developer site with internal users; Beta in real environment with external users.
  - id: tl-008
    type: single
    difficulty: medium
    q: "Ice-cream cone anti-pattern:"
    options:
      - A) Too many unit tests
      - B) Too many UI tests, few unit
      - C) Equal tests at all levels
      - D) No tests at all
    answer: 1
    hint: Inverted pyramid.
    explanation: Inverted pyramid = slow brittle suite, expensive maintenance.
  - id: tl-009
    type: single
    difficulty: medium
    q: "Best place to mock external API:"
    options:
      - A) UAT
      - B) Unit / integration
      - C) Production
      - D) Smoke test in prod
    answer: 1
    hint: Isolate dependencies.
    explanation: Lower levels need isolation for speed/determinism. UAT/prod use real services. and
  - id: tl-010
    type: single
    difficulty: medium
    q: "Smoke test typically runs at:"
    options:
      - A) Unit level
      - B) Build verification, after deploy
      - C) UAT only
      - D) After UAT
    answer: 1
    hint: Sanity check post-deploy.
    explanation: Smoke = quick broad check after build/deploy to confirm not fundamentally broken.
  - id: tl-011
    type: single
    difficulty: medium
    q: "Operational acceptance tests check:"
    options:
      - A) Business rules
      - B) Backup, restore, monitoring, ops procedures
      - C) Code style
      - D) Designer mockups
    answer: 1
    hint: Ops team perspective.
    explanation: "OAT validates operational readiness: monitoring, recovery, runbooks."
  - id: tl-012
    type: single
    difficulty: medium
    q: "Sandwich integration combines:"
    options:
      - A) Top-down + bottom-up
      - B) Big-bang + smoke
      - C) Unit + UAT
      - D) Manual + automated
    answer: 0
    hint: Both ends meet middle.
    explanation: Sandwich (a.k.a. hybrid) integrates from both top and bottom toward middle.
  - id: tl-013
    type: single
    difficulty: medium
    q: "System test environment should:"
    options:
      - A) Match production closely
      - B) Use developer laptops
      - C) Use prod DB read/write
      - D) Skip data
    answer: 0
    hint: Production-like.
    explanation: Production-like env reduces env-related false positives/negatives.
  - id: tl-014
    type: single
    difficulty: medium
    q: Why fewer UI tests?
    options:
      - A) Less important
      - B) Slow, brittle, expensive to maintain
      - C) Devs don't write them
      - D) Tools don't exist
    answer: 1
    hint: Cost vs speed tradeoff.
    explanation: UI tests slow + brittle (selectors, async). Pyramid pushes coverage downward. and
  - id: tl-015
    type: single
    difficulty: medium
    q: "Contract acceptance tests verify:"
    options:
      - A) Compliance with legal/contractual specs
      - B) Database schemas
      - C) Code review checklist
      - D) Sprint backlog
    answer: 0
    hint: Legal contract obligations.
    explanation: Contract acceptance = obligations from legal contract met. Distinct from API contract testing.
  - id: tl-016
    type: single
    difficulty: hard
    q: "Regression often runs at:"
    options:
      - A) Only unit level
      - B) All levels, automated where possible
      - C) Only manual
      - D) Only UAT
    answer: 1
    hint: After changes, verify nothing broken.
    explanation: Regression cuts across levels; each level catches different break.
  - id: tl-017
    type: single
    difficulty: hard
    q: Component test = ?
    options:
      - A) Same as system
      - B) Same as unit (sometimes called module test)
      - C) Same as UAT
      - D) Same as integration
    answer: 1
    hint: Single component in isolation.
    explanation: ISTQB synonym for unit/module test.
  - id: tl-018
    type: single
    difficulty: hard
    q: "Integration test catches mostly:"
    options:
      - A) Logic bugs in single function
      - B) Interface mismatches between modules
      - C) UI styling
      - D) Performance only
    answer: 1
    hint: Boundaries.
    explanation: Integration focuses on contract/interface between modules â€” wrong types, missed fields, async timing.
  - id: tl-019
    type: single
    difficulty: hard
    q: "Test data for UAT should be:"
    options:
      - A) Random
      - B) Representative of real production scenarios
      - C) Empty DB
      - D) Only happy path
    answer: 1
    hint: Real-world coverage.
    explanation: UAT validates real workflows; needs realistic data.
  - id: tl-020
    type: single
    difficulty: hard
    q: Which level is hardest to automate fully?
    options:
      - A) Unit
      - B) Integration
      - C) UAT
      - D) API
    answer: 2
    hint: Human judgment involved.
    explanation: UAT involves business users, exploratory checks, judgment calls. Partial automation possible but signoff manual.
