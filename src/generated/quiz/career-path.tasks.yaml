lesson: career-path
tasks:
  - id: cp-t001
    type: fill_blank
    q: 'Fill: Modern Testing principle 1 = "Improve the ____, not just the ____."'
    answer: team / product
    hint: Coach framing.
    explanation: Role as enabler. See [[#Modern Testing Principles
      (Bach/Bolton/Rosa-Bilbao)]].
  - id: cp-t002
    type: fill_blank
    q: "Task: Sketch a 12-month skill plan for a Junior QA aiming for SDET in 1
      year."
    answer: >-
      - Q1: Python deep dive ([[Python-for-QA]]); Pytest basics; Git fluency.

      - Q2: Playwright e2e suite for one product area; CI in GitHub Actions
      ([[Jenkins-GitHub-Actions]]).

      - Q3: API testing with RestAssured/Postman; SQL practice; framework
      refactor (page objects, fixtures).

      - Q4: Docker for test envs; reporting (Allure); lead one quality
      initiative; OSS PR; ISTQB CTFL if not done; mock-interview SDET loop.

      - Cross-quarter: weekly blog/notebook entry, 1 meetup talk, mentor a newer
      tester.
    hint: Anchor each quarter to a deliverable.
    explanation: Visible artifacts + breadth-then-depth. See [[#Skill Stack â€”
      T-Shaped]] and [[#Building a Portfolio]].
  - id: cp-t003
    type: fill_blank
    q: "Fill: STAR = ____ / ____ / ____ / ____."
    answer: Situation / Task / Action / Result
    hint: Behavioral story frame.
    explanation: Standard interview structure. See [[#Interview Stories â€” STAR]].
