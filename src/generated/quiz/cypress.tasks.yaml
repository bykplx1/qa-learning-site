lesson: cypress
tasks:
  - id: c-t001
    type: fill_blank
    q: 'Fill: To stub GET `/api/users` returning fixture file `users.json`:
      `cy.intercept("GET","/api/users",{ ______: "users.json"})`.'
    answer: fixture
    hint: Built-in option.
    explanation: Loads from cypress/fixtures. See [[#Network Stubs]].
  - id: c-t002
    type: fill_blank
    q: "Task: Write Cypress login custom command using `cy.session` and `cy.request`
      for `/api/login`."
    answer: |-
      ```js
      Cypress.Commands.add("login", (u,p) => {
        cy.session([u,p], () => {
          cy.request("POST","/api/login",{u,p}).then(r => {
            window.localStorage.setItem("token", r.body.token);
          });
        });
      });
      ```
    hint: Cache by user.
    explanation: Skips UI login each test. See [[#Custom Commands]].
  - id: c-t003
    type: fill_blank
    q: "Fill: Cypress test files live by default in folder `cypress/______/`."
    answer: e2e
    hint: Replaced "integration" in v10+.
    explanation: Folder convention since Cypress 10. See [[#Setup]].
