lesson: career-path
questions:
  - id: cp-001
    type: single
    q: T-shaped skill stack =
    options:
      - A) Only deep
      - B) Only wide
      - C) Wide base + one deep spike
      - D) Random
    answer: 2
    hint: Letter T.
    explanation: Most marketable shape. See [[#Skill Stack â€” T-Shaped]].
  - id: cp-002
    type: single
    q: "Largest single-step raise typically:"
    options:
      - A) Annual review
      - B) Switch companies
      - C) Cert
      - D) Side project
    answer: 1
    hint: Re-bench salary.
    explanation: External offer resets baseline. See [[#Compensation Levers]].
  - id: cp-003
    type: single
    q: "SDET role emphasis:"
    options:
      - A) Manual exploratory only
      - B) Code-heavy automation + framework eng
      - C) Project management
      - D) UAT
    answer: 1
    hint: Closer to dev.
    explanation: Engineering skills central. See [[#Specialist Branches]].
  - id: cp-004
    type: single
    q: "Switch to management when you enjoy:"
    options:
      - A) Pure code
      - B) 1:1s, hiring, conflict, prioritization
      - C) Solo work
      - D) Late nights
    answer: 1
    hint: People work.
    explanation: Otherwise misery. See [[#Management Track]].
  - id: cp-005
    type: single
    q: STAR =
    options:
      - A) Situation/Task/Action/Result
      - B) Story/Test/Acceptance/Run
      - C) Spec/Test/Auto/Report
      - D) Setup/Test/Assert/Restore
    answer: 0
    hint: Behavioral interview frame.
    explanation: Structures answers. See [[#Interview Stories â€” STAR]].
  - id: cp-006
    type: single
    q: "Modern Testing principle 1:"
    options:
      - A) Find more bugs
      - B) Improve the team, not just the product
      - C) Automate everything
      - D) Gate releases
    answer: 1
    hint: Coach mindset.
    explanation: Frames role as enabler. See [[#Modern Testing Principles
      (Bach/Bolton/Rosa-Bilbao)]].
  - id: cp-007
    type: single
    q: "Cert role typically:"
    options:
      - A) Replace portfolio
      - B) Pass HR filters / signal baseline
      - C) Decide senior pay
      - D) Prove production code skill
    answer: 1
    hint: Filter, not decider.
    explanation: Portfolio outweighs at senior level. See [[#Certifications (Signal,
      Not Substance)]].
  - id: cp-008
    type: single
    q: "Best 90-day day-1â€“30 focus:"
    options:
      - A) Ship a refactor
      - B) Read, ride-along, repro existing bugs, map systems
      - C) Hire
      - D) Reorg
    answer: 1
    hint: Listen first.
    explanation: Establish baseline. See [[#90-Day Plan in New Role]].
  - id: cp-009
    type: single
    q: "Anti-pattern: tool collector means:"
    options:
      - A) Knows many tools
      - B) Many shallow > one deep
      - C) Best practice
      - D) Required for SDET
    answer: 1
    hint: Breadth without depth.
    explanation: No leverage. See [[#Anti-Patterns]].
  - id: cp-010
    type: single
    q: "Pivot easiest from QA to:"
    options:
      - A) Director
      - B) DevOps/SRE â€” test infra carries over
      - C) HR
      - D) Sales
    answer: 1
    hint: Adjacent skills.
    explanation: Infra + observability shared. See [[#Adjacent Pivots]].
  - id: cp-011
    type: single
    q: "ISTQB Advanced TM aimed at:"
    options:
      - A) Junior automation
      - B) Mid/senior management/strategy track
      - C) Pentest
      - D) UI design
    answer: 1
    hint: Test mgmt depth.
    explanation: Strategy + estimation. See [[03-Advanced-Test-Manager]].
  - id: cp-012
    type: single
    q: "Burnout signal:"
    options:
      - A) Curiosity
      - B) Cynicism about all bugs, suite hatred
      - C) Mentoring
      - D) Speaking at meetups
    answer: 1
    hint: Avoidance + cynicism.
    explanation: Early intervention matters. See [[#Burnout Signals]].
  - id: cp-013
    type: single
    q: "Compounding > sprints in learning means:"
    options:
      - A) Cram before reviews
      - B) Small daily/weekly practice consistently
      - C) Cert binge
      - D) One big course
    answer: 1
    hint: Consistency.
    explanation: Compounds long-term. See [[#Continuous Learning Loop]].
  - id: cp-014
    type: single
    q: "Senior QA interview likely round:"
    options:
      - A) UAT only
      - B) Test design + framework design + behavioral
      - C) Singing
      - D) Writing essays
