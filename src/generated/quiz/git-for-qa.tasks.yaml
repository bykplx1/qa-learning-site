lesson: git-for-qa
tasks:
  - id: gfq-t001
    type: fill_blank
    q: "Fill: Command to find which commit introduced a regression: `git ______`."
    answer: bisect
    hint: Binary search history.
    explanation: Pinpoints first-bad commit. See [[#Bisect (regression hunt)]].
  - id: gfq-t002
    type: fill_blank
    q: "Task: Write a Conventional Commits message for adding API tests on the
      `/users` endpoint."
    answer: |-
      ```
      test(api): add coverage for /users CRUD and 401 paths
      ```
    hint: "type(scope): subject."
    explanation: Machine-parseable; drives changelogs. See [[#QA-Specific Patterns]].
  - id: gfq-t003
    type: fill_blank
    q: "Fill: Safe push that aborts if remote moved is `git push --______`."
    answer: force-with-lease
    hint: Lease check.
    explanation: Prevents overwriting teammate commits. See [[#Sync With Remote]].
