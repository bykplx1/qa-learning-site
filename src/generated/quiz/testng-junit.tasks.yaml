lesson: testng-junit
tasks:
  - id: tj-t001
    type: fill_blank
    q: "Fill: JUnit 5 method-source parametrize annotation = `@______Source`."
    answer: Method
    hint: Returns Stream.
    explanation: Loads args from static method. See [[#Parameterized]].
  - id: tj-t002
    type: fill_blank
    q: "Task: Write JUnit 5 parametrized test for add(a,b) with cases (1,1,2),
      (2,3,5)."
    answer: |-
      ```java
      @ParameterizedTest
      @CsvSource({"1,1,2","2,3,5"})
      void add(int a, int b, int exp) {
        assertEquals(exp, a + b);
      }
      ```
    hint: CsvSource.
    explanation: Inline csv rows. See [[#Parameterized]].
  - id: tj-t003
    type: fill_blank
    q: "Fill: TestNG retry interface name = `IRetry______`."
    answer: Analyzer
    hint: Implement retry().
    explanation: Hook to rerun failed tests. See [[#Retry Analyzer]].
