lesson: javascript-typescript-for-qa
tasks:
  - id: jtfq-t001
    type: fill_blank
    q: "Fill: Strict equality operator in JS is `______`."
    answer: ===
    hint: Three equals.
    explanation: Avoids coercion bugs. See [[#Equality]].
  - id: jtfq-t002
    type: fill_blank
    q: 'Task: Write a Playwright test asserting page title contains "Dashboard".'
    answer: |-
      ```ts
      import { test, expect } from "@playwright/test";
      test("dashboard title", async ({ page }) => {
        await page.goto("https://app.x/dashboard");
        await expect(page).toHaveTitle(/Dashboard/);
      });
      ```
    hint: "`toHaveTitle` matcher."
    explanation: Built-in assertion auto-retries until match. See [[#Playwright Test
      (sample)]].
  - id: jtfq-t003
    type: fill_blank
    q: "Fill: TS keyword for safe-by-default unknown type is `______` (not `any`)."
    answer: unknown
    hint: Forces narrowing.
    explanation: Type-safe replacement for `any`. See [[#TS Pitfalls]].
