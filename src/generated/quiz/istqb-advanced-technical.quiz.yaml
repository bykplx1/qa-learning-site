lesson: istqb-advanced-technical
questions:
  - id: iat-001
    type: single
    q: "MC/DC requires:"
    options:
      - A) Every branch
      - B) Every condition combination
      - C) Each atomic Boolean independently affecting outcome
      - D) Statements only
    answer: 2
    hint: Independence.
    explanation: Required for DO-178C. See [[#Modified Condition/Decision Coverage
      (MC/DC)]].
  - id: iat-002
    type: single
    q: "Cyclomatic complexity formula:"
    options:
      - A) E âˆ’ N
      - B) E âˆ’ N + 2
      - C) N âˆ’ E
      - D) Decisions Ã— 2
    answer: 1
    hint: Edges, nodes.
    explanation: McCabe's formula. See [[#Cyclomatic Complexity (V(G))]].
  - id: iat-003
    type: single
    q: "Coverage hierarchy strongest:"
    options:
      - A) Statement
      - B) Decision
      - C) MC/DC
      - D) Multiple Condition
    answer: 3
    hint: All combinations.
    explanation: Multiple condition is exhaustive on atoms. See [[#Coverage
      Hierarchy (loose order)]].
  - id: iat-004
    type: single
    q: "Static analysis tool example:"
    options:
      - A) JMeter
      - B) SonarQube
      - C) Selenium
      - D) Postman
    answer: 1
    hint: Code scan.
    explanation: SonarQube is static analysis. See [[#Static Analysis]].
  - id: iat-005
    type: single
    q: "Dynamic analysis detects:"
    options:
      - A) Style
      - B) Memory leaks, thread issues at runtime
      - C) Spec ambiguity
      - D) Coverage statically
    answer: 1
    hint: Runtime.
    explanation: Valgrind/ASan etc. See [[#Dynamic Analysis]].
  - id: iat-006
    type: single
    q: "Endurance testing focus:"
    options:
      - A) Spike load
      - B) Sustained load over long duration to find leaks/degradation
      - C) Sudden stress
      - D) Single user
    answer: 1
    hint: Soak.
    explanation: Long-run reveals leaks. See [[#Performance]].
  - id: iat-007
    type: single
    q: "Stress testing:"
    options:
      - A) Normal load
      - B) Beyond capacity to find break points
      - C) UI smoke
      - D) Static
    answer: 1
    hint: Push past limit.
    explanation: Reveals saturation behavior. See [[#Performance]].
  - id: iat-008
    type: single
    q: "gTAA layers count:"
    options:
      - A) 2
      - B) 3
      - C) 4
      - D) 5
    answer: 2
    hint: Generation, Definition, Execution, Adaptation.
    explanation: ISTQB reference architecture. See [[#Automation Strategy]].
  - id: iat-009
    type: single
    q: "Test Automation Solution (TAS):"
    options:
      - A) Generic ref arch
      - B) Concrete instantiation of gTAA for specific SUT
      - C) A tool brand
      - D) Coverage report
    answer: 1
    hint: Concrete vs abstract.
    explanation: TAS realizes gTAA. See [[#TAS (Test Automation Solution)]].
  - id: iat-010
    type: single
    q: "When NOT to automate:"
    options:
      - A) Stable regression
      - B) One-off exploratory or rapidly-changing UI prototype
      - C) Smoke
      - D) API contract
    answer: 1
    hint: Volatile / single-use.
    explanation: Maintenance cost > value. See [[#When to Automate]].
  - id: iat-011
    type: single
    q: "ISO 25010 reliability sub-char NOT include:"
    options:
      - A) Maturity
      - B) Availability
      - C) Fault tolerance
      - D) Aesthetics
    answer: 3
    hint: Aesthetics is usability.
    explanation: "Reliability sub-chars: maturity, availability, fault tolerance,
      recoverability. See [[#Reliability]]."
  - id: iat-012
    type: single
    q: p99 latency =
    options:
      - A) 99th-percentile response time
      - B) 99% pass rate
      - C) Throughput
      - D) Errors
    answer: 0
    hint: Tail latency.
    explanation: Tail-aware metric. See [[#Performance]].
  - id: iat-013
    type: single
    q: "STRIDE used for:"
    options:
      - A) Performance
      - B) Threat modeling categories (Spoofing, Tampering, Repudiation, Info
        disclosure, DoS, Elevation)
      - C) Coverage
      - D) BDD
    answer: 1
    hint: Microsoft model.
    explanation: Standard threat taxonomy. See [[#Security]].
  - id: iat-014
    type: single
    q: "SAST vs DAST:"
    options:
      - A) Same
      - B) SAST = static analysis of source; DAST = dynamic against running app
      - C) Both runtime
      - D) Both static
    answer: 1
    hint: Static vs dynamic.
    explanation: Two complementary security test types. See [[#Security]].
  - id: iat-015
    type: single
    q: "Capture/replay automation downside:"
    options:
      - A) Fast
      - B) Brittle, no abstraction, low maintainability
      - C) Cheap
      - D) Open source
    answer: 1
    hint: No POs.
    explanation: Anti-pattern at scale. See [[#Test Automation Architecture]].
  - id: iat-016
    type: single
    q: "Statement coverage 100% guarantees:"
    options:
      - A) All branches taken
      - B) Every line executed; branches may be missed
      - C) MC/DC
      - D) Path
    answer: 1
    hint: Weakest bar.
    explanation: Lines â‰  all paths. See [[#Coverage Hierarchy (loose order)]].
  - id: iat-017
    type: single
    q: "Cyclomatic complexity > 10 implies:"
    options:
      - A) Good code
      - B) Refactor â€” testability/maintainability concern
      - C) High coverage
      - D) Performance issue
    answer: 1
    hint: Threshold.
    explanation: Standard guideline. See [[#Cyclomatic Complexity (V(G))]].
  - id: iat-018
    type: single
    q: "Co-existence testing:"
    options:
      - A) Multi-user
      - B) App runs alongside other apps without interference
      - C) Browser compat
      - D) Backwards compat
    answer: 1
    hint: Resource sharing.
    explanation: ISO 25010 compatibility sub-char. See [[#Compatibility]].
  - id: iat-019
    type: single
    q: "Profiler purpose:"
    options:
      - A) Static scan
      - B) Runtime hotspot / CPU / memory analysis
      - C) UI test
      - D) Defect tracking
    answer: 1
    hint: Performance investigation.
    explanation: Profilers find hot paths. See [[#Dynamic Analysis]].
  - id: iat-020
    type: single
    q: CWE =
    options:
      - A) Continuous Weighted Estimate
      - B) Common Weakness Enumeration (catalog of software weaknesses)
      - C) Code Worth Eval
      - D) Cyclomatic Weight Eq
    answer: 1
    hint: Security catalog.
    explanation: |-
      MITRE catalog of software weaknesses. See [[#Security]].

      ---
