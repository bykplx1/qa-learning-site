name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Run the visual job with --update-snapshots and upload regenerated PNGs as artifact (deliberate baseline update — see CONTRIBUTING.md).'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qa_learning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/qa_learning_test
      BETTER_AUTH_SECRET: test-secret-at-least-32-bytes-long-aaaaaaaaa
      BETTER_AUTH_URL: http://localhost:4321
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx astro check

      - name: Unit tests
        run: npm test

      - name: Apply DB migrations
        run: npx drizzle-kit migrate

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          E2E_OAUTH_MOCK: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    # Visual regression — Linux only. Cross-OS font rendering produces
    # noise that's impossible to manage, so baselines live in CI exclusively.
    # Fails the PR on any unexpected pixel diff. There is NO auto-update path:
    # baseline updates are deliberate, see CONTRIBUTING.md.
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Visual regression tests
        if: ${{ inputs.update_visual_baselines != true }}
        run: npm run test:visual

      - name: Regenerate baselines (deliberate)
        if: ${{ inputs.update_visual_baselines == true }}
        run: npm run test:visual:update

      - name: Upload regenerated baselines artifact
        if: ${{ inputs.update_visual_baselines == true }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/**/*-snapshots/**
          retention-days: 14

      - name: Upload visual report
        if: always() && inputs.update_visual_baselines != true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-visual-report/
            test-results/
          retention-days: 14
