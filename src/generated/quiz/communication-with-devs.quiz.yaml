lesson: communication-with-devs
questions:
  - id: cwd-001
    type: single
    q: "Best opener for a bug discussion:"
    options:
      - A) "Your code is broken"
      - 'B) "Repro on stg build X: steps + log + AC reference"'
      - C) "It doesn't work"
      - D) "Why did you ship this?"
    answer: 1
    hint: Evidence + oracle.
    explanation: Removes blame, accelerates triage. See [[#Bug Talk]].
  - id: cwd-002
    type: single
    q: XY problem =
    options:
      - A) Dev refuses to fix
      - B) Asking about attempted fix instead of actual goal
      - C) UI vs API confusion
      - D) Severity vs priority
    answer: 1
    hint: Hidden goal.
    explanation: Frame goal first. See [[#Asking Questions]].
  - id: cwd-003
    type: single
    q: "Channel for production emergency:"
    options:
      - A) Email
      - B) DM to dev
      - C) Incident channel + page
      - D) Ticket comment
    answer: 2
    hint: Visibility + on-call.
    explanation: Mobilize responders. See [[#Channels — Pick the Right One]].
  - id: cwd-004
    type: single
    q: '"Behavior not blame" means:'
    options:
      - A) Hide who wrote it
      - B) Describe what system does, not who erred
      - C) No bug attribution
      - D) Anonymous tickets
    answer: 1
    hint: Depersonalize.
    explanation: Preserves collaboration. See [[#Core Principles]].
  - id: cwd-005
    type: single
    q: "Disagree-and-commit applies when:"
    options:
      - A) You're the decider
      - B) You disagreed but lost the call — execute anyway
      - C) Always
      - D) Never
    answer: 1
    hint: Post-decision behavior.
    explanation: Avoids passive sabotage. See [[#Disagreement Playbook]].
  - id: cwd-006
    type: single
    q: "Code-review tone for QA:"
    options:
      - A) Assertions only
      - B) Questions > assertions ("what if X?")
      - C) Upvote/downvote
      - D) Approve all
    answer: 1
    hint: Curious framing.
    explanation: Lower defensiveness. See [[#Code Review by QA]].
  - id: cwd-007
    type: single
    q: "Sync over async preferred when:"
    options:
      - A) Routine status
      - B) Emotionally charged or many unknowns
      - C) Cross-timezone
      - D) Single answer needed
    answer: 1
    hint: Bandwidth need.
    explanation: Faster ambiguity resolution. See [[#Async vs Sync Decision]].
  - id: cwd-008
    type: single
    q: "Bug closed w/o retest by dev — first move:"
    options:
      - A) Public Slack callout
      - B) Reopen with repro video, calm note
      - C) Escalate to manager immediately
      - D) Drop it
    answer: 1
    hint: Evidence + ticket.
    explanation: Keep loop short, professional. See [[#Difficult Scenarios]].
  - id: cwd-009
    type: single
    q: 'Estimating "how long":'
    options:
      - A) Single number
      - B) Range w/ confidence + assumptions
      - C) Refuse
      - D) Day rate
    answer: 1
    hint: Honest uncertainty.
    explanation: Calibration > precision. See [[#Estimating + Pushback]].
  - id: cwd-010
    type: single
    q: "Tester translates between:"
    options:
      - A) Code and business
      - B) Frontend and backend
      - C) DBs
      - D) Browsers
    answer: 0
    hint: Layer fluency.
    explanation: Often only bilingual role. See [[#Cross-Functional Vocabulary]].
  - id: cwd-011
    type: single
    q: '"Just rerun the flaky test" anti-pattern because:'
    options:
      - A) Wastes CI
      - B) Masks real bug, normalizes flake
      - C) Slower
      - D) Costs money
    answer: 1
    hint: Hidden defect signal.
    explanation: Flake is a bug. See [[#Anti-Patterns]].
  - id: cwd-012
    type: single
    q: "Action items in meetings need:"
    options:
      - A) Just description
      - B) Owner + date
      - C) Severity
      - D) Approval
    answer: 1
    hint: Accountability.
    explanation: Otherwise drift. See [[#Meeting Etiquette]].
  - id: cwd-013
    type: single
    q: ADR =
    options:
      - A) Architecture Decision Record
      - B) Agile Defect Report
      - C) Automated Detection Rule
      - D) Application Dev Ratio
    answer: 0
    hint: Durable choice doc.
    explanation: Captures why a decision was made. See [[#Disagreement Playbook]].
  - id: cwd-014
    type: single
    q: "Time-box for pairing session:"
    options:
      - A) Open-ended
      - B) 45–90 min
      - C) 4 hours
      - D) Whole day
    answer: 1
    hint: Avoid fatigue.
    explanation: Long sessions lose value. See [[#Pairing Patterns]].
  - id: cwd-015
    type: single
    q: "Standup detail level:"
    options:
      - A) Full status
      - B) Did / will / blockers — details in ticket
      - C) Skip
      - D) Code review
    answer: 1
    hint: Avoid status-theater.
    explanation: Time-respect for team. See [[#Standup Hygiene]].
  - id: cwd-016
    type: single
    q: "Public shaming in channels:"
    options:
      - A) Effective
      - B) Destroys trust, drives hiding
      - C) Required by Scrum
      - D) Builds urgency
    answer: 1
    hint: Trust cost.
    explanation: Long-term damage. See [[#Anti-Patterns]].
  - id: cwd-017
    type: single
    q: "Words to avoid in written QA tone:"
    options:
      - A) "Repro", "expected"
      - B) "Obviously", "just", "simply"
      - C) "Hint", "fix"
      - D) "Edge case"
    answer: 1
    hint: Implies reader is slow.
    explanation: Removes condescension. See [[#Written Tone Tips]].
  - id: cwd-018
    type: single
    q: 'Pushback on "ship now, fix later":'
    options:
      - A) Refuse to release
      - "B) Quantify risk: blast radius + rollback cost"
      - C) Escalate over PO
      - D) Stay silent
    answer: 1
    hint: Data, not opinion.
    explanation: PO can decide with risk in hand. See [[#Estimating + Pushback]].
  - id: cwd-019
    type: single
    q: "Trust-building loop example:"
    options:
      - A) Defer bad news
      - B) Deliver bad news early
      - C) Inflate severity
      - D) Blame infra
    answer: 1
    hint: Surface fast.
    explanation: Predictability builds trust. See [[#Trust-Building Loops]].
  - id: cwd-020
    type: single
    q: "Disagreement Playbook step 1:"
    options:
      - A) Escalate
      - B) Restate their position to their satisfaction
      - C) Vote
      - D) Walk away
    answer: 1
    hint: Steel-man.
    explanation: |-
      Confirms understanding before debate. See [[#Disagreement Playbook]].

      ---
