lesson: security-testing
questions:
  - id: st-001
    type: single
    difficulty: easy
    q: "SAST scans:"
    options:
      - A) Running app
      - B) Source code statically
      - C) Network traffic
      - D) DNS
    answer: 1
    hint: Static analysis.
    explanation: SAST = Static Application Security Testing on source.
  - id: st-002
    type: single
    difficulty: easy
    q: "DAST requires:"
    options:
      - A) Source code
      - B) Running app to probe
      - C) Compiler only
      - D) Database dump
    answer: 1
    hint: Dynamic.
    explanation: DAST exercises live app like attacker.
  - id: st-003
    type: single
    difficulty: easy
    q: "IDOR stands for:"
    options:
      - A) Insecure Direct Object Reference
      - B) Internal Data Object Read
      - C) Identity Driven Object Routing
      - D) Indexed Database OR
    answer: 0
    hint: Authorization gap.
    explanation: Endpoint trusts client-supplied object ID without ownership check.
  - id: st-004
    type: single
    difficulty: easy
    q: "CIA triad:"
    options:
      - A) Confidentiality, Integrity, Availability
      - B) Crypto, Identity, Audit
      - C) Compliance, Inspection, Audit
      - D) Cipher, Index, Audit
    answer: 0
    hint: Core security goals.
    explanation: CIA = foundational properties.
  - id: st-005
    type: single
    difficulty: easy
    q: "SQLi test payload example:"
    options:
      - A) `<script>alert(1)</script>`
      - B) `' OR '1'='1`
      - C) `../../etc/passwd`
      - D) `?next=evil.com`
    answer: 1
    hint: Quote + always true.
    explanation: Tautology breaks WHERE clause.
  - id: st-006
    type: single
    difficulty: easy
    q: "XSS payload:"
    options:
      - A) `' OR 1=1`
      - B) `<script>alert(1)</script>`
      - C) `../../etc/passwd`
      - D) `;rm -rf /`
    answer: 1
    hint: Browser script injection.
    explanation: XSS executes JS in victim's browser context.
  - id: st-007
    type: single
    difficulty: easy
    q: "CSRF mitigation:"
    options:
      - A) HTTPS only
      - B) Anti-CSRF token + SameSite cookie
      - C) Hash password
      - D) Disable JS
    answer: 1
    hint: Cross-site request.
    explanation: Token + SameSite prevent forged cross-origin requests.
  - id: st-008
    type: single
    difficulty: medium
    q: "SCA tool checks:"
    options:
      - A) Source style
      - B) Dependency CVEs / known vuln versions
      - C) UI accessibility
      - D) DB perf
    answer: 1
    hint: Software composition.
    explanation: SCA flags vulnerable libs/images.
  - id: st-009
    type: single
    difficulty: medium
    q: 'STRIDE "T":'
    options:
      - A) Tampering
      - B) Throttling
      - C) Tracing
      - D) Tunneling
    answer: 0
    hint: Integrity threat.
    explanation: T = Tampering with data/code.
  - id: st-010
    type: single
    difficulty: medium
    q: "Header that prevents clickjacking:"
    options:
      - A) `X-Frame-Options` / CSP frame-ancestors
      - B) `Content-Type`
      - C) `Cache-Control`
      - D) `Server`
    answer: 0
    hint: Iframe restriction.
    explanation: Restricts who can frame the site.
  - id: st-011
    type: single
    difficulty: medium
    q: "CVSS High range:"
    options:
      - A) 0.1–3.9
      - B) 4.0–6.9
      - C) 7.0–8.9
      - D) 9.0+
    answer: 2
    hint: High vs Critical.
    explanation: High = 7.0–8.9; Critical = 9.0+.
  - id: st-012
    type: single
    difficulty: medium
    q: "SSRF means:"
    options:
      - A) Server-Side Request Forgery
      - B) Same-Site Request Filter
      - C) Static Source Replay
      - D) Secure Socket RF
    answer: 0
    hint: Server fetches attacker URL.
    explanation: Attacker forces server to call internal/sensitive URL.
  - id: st-013
    type: single
    difficulty: medium
    q: "JWT `alg=none` exploit:"
    options:
      - A) Bypass signature
      - B) Encrypts JWT
      - C) Adds MFA
      - D) Compresses
    answer: 0
    hint: No verification.
    explanation: Server accepts unsigned token if `alg=none` allowed.
  - id: st-014
    type: single
    difficulty: medium
    q: "HSTS header purpose:"
    options:
      - A) Force HTTPS
      - B) Lazy loading
      - C) Cache static
      - D) DNS pinning
    answer: 0
    hint: Strict Transport.
    explanation: HSTS forces HTTPS to prevent SSL strip.
  - id: st-015
    type: single
    difficulty: medium
    q: "Vertical privilege escalation:"
    options:
      - A) User → other user
      - B) User → admin
      - C) Admin → user
      - D) Read → write
    answer: 1
    hint: Role uplift.
    explanation: Vertical = gain higher role; horizontal = peer access.
  - id: st-016
    type: single
    difficulty: hard
    q: "Fuzzing means:"
    options:
      - A) Manual review
      - B) Random/malformed input to find crashes
      - C) Encryption
      - D) Logging
    answer: 1
    hint: Bombard inputs.
    explanation: Fuzzers feed unexpected input to surface defects.
  - id: st-017
    type: single
    difficulty: hard
    q: "Burp Suite role:"
    options:
      - A) DAST proxy / pen-test toolkit
      - B) Compiler
      - C) Mock DB
      - D) IDE
    answer: 0
    hint: Intercept proxy.
    explanation: Burp intercepts/modifies HTTP for security testing.
  - id: st-018
    type: single
    difficulty: hard
    q: "OWASP Top 10 #1 (2021):"
    options:
      - A) Injection
      - B) Broken Access Control
      - C) XSS
      - D) CSRF
    answer: 1
    hint: Moved to top.
    explanation: Broken Access Control most common in 2021 list.
  - id: st-019
    type: single
    difficulty: hard
    q: "Secret scanning typical stage:"
    options:
      - A) After release
      - B) Pre-commit / CI
      - C) Manual yearly
      - D) Never
    answer: 1
    hint: Catch early.
    explanation: Pre-commit + CI block secrets reaching repo.
  - id: st-020
    type: single
    difficulty: hard
    q: "Pen test should be done:"
    options:
      - A) On prod without notice
      - B) With written authorization + scope
      - C) Anonymously
      - D) Once ever
    answer: 1
    hint: Rules of engagement.
    explanation: Authorization + scope = legal + safe testing.
