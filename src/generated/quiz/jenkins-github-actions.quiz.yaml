lesson: jenkins-github-actions
questions:
  - id: jga-001
    type: single
    q: "CI primary goal:"
    options:
      - A) Deploy to prod each commit
      - B) Detect integration issues fast via automated build/test on each change
      - C) Replace QA
      - D) Manual sign-off
    answer: 1
    hint: Fast feedback.
    explanation: CI integrates frequently and tests immediately. See [[#CI/CD Quick Recap]].
  - id: jga-002
    type: single
    q: "Jenkins declarative vs scripted:"
    options:
      - A) Same syntax
      - B) Declarative uses `pipeline {}` block; scripted is raw Groovy
      - C) Declarative deprecated
      - D) Scripted YAML
    answer: 1
    hint: "`pipeline {}`."
    explanation: Declarative is structured DSL; scripted is full Groovy. See
      [[#Scripted vs Declarative]].
  - id: jga-003
    type: single
    q: "GHA workflow file location:"
    options:
      - A) `/ci/`
      - B) `.github/workflows/*.yml`
      - C) `Jenkinsfile`
      - D) `.gha/`
    answer: 1
    hint: Repo-relative.
    explanation: GitHub auto-discovers workflows there. See [[#GitHub Actions Core]].
  - id: jga-004
    type: single
    q: "Trigger workflow on PR:"
    options:
      - "A) `on: pr`"
      - "B) `on: pull_request`"
      - "C) `on: merge`"
      - "D) `on: branch`"
    answer: 1
    hint: Standard event.
    explanation: Event name. See [[#Triggers Comparison]].
  - id: jga-005
    type: single
    q: Required check =
    options:
      - A) Optional log
      - B) Status that must be green to merge into protected branch
      - C) Manual review
      - D) Code coverage
    answer: 1
    hint: Branch protection.
    explanation: Gates merge. See [[#Branch Protection / Required Checks]].
  - id: jga-006
    type: single
    q: "GHA cache key best practice:"
    options:
      - A) Static string
      - B) Hash of lockfile (`hashFiles('**/package-lock.json')`)
      - C) Branch name
      - D) Date
    answer: 1
    hint: Invalidates on dep change.
    explanation: Lockfile changes → new cache. See [[#Caching]].
  - id: jga-007
    type: single
    q: "Secrets in GHA logs:"
    options:
      - A) Printed plain
      - B) Auto-masked when matched, still risky with `set -x`
      - C) Never available
      - D) Only via env
    answer: 1
    hint: Mask not bulletproof.
    explanation: Avoid echo/printenv. See [[#Secrets Management]].
  - id: jga-008
    type: single
    q: Jenkins agent =
    options:
      - A) GUI plugin
      - B) Worker node executing pipeline steps
      - C) Reporter
      - D) Repo
    answer: 1
    hint: Executor.
    explanation: Controller delegates jobs to agents. See [[#Jenkins Core]].
  - id: jga-009
    type: single
    q: "`pull_request_target` risk:"
    options:
      - A) Slow
      - B) Runs with repo secrets — checking out fork code can leak them
      - C) No PR support
      - D) Always blocked
    answer: 1
    hint: Secrets exposed.
    explanation: Trusted context vs untrusted code. See [[#Common Pitfalls]].
  - id: jga-010
    type: single
    q: "Build matrix value:"
    options:
      - A) UI only
      - B) Run combinations (OS × version × browser) in parallel
      - C) Sequential only
      - D) Single job
    answer: 1
    hint: Combinations.
    explanation: Parallel coverage. See [[#Build Matrix]].
  - id: jga-011
    type: single
    q: "`needs:` in GHA:"
    options:
      - A) Permissions
      - B) Job dependency — run after listed job(s) succeed
      - C) Required action
      - D) Marketplace
    answer: 1
    hint: DAG ordering.
    explanation: Sequencing jobs. See [[#Workflow Example]].
  - id: jga-012
    type: single
    q: "JUnit XML role:"
    options:
      - A) Source code format
      - B) Universal test result format consumed by CI for reporting
      - C) Coverage only
      - D) Allure replacement
    answer: 1
    hint: Standard report.
    explanation: Most CI tools render JUnit XML natively. See [[#Artifacts + Reports]].
  - id: jga-013
    type: single
    q: "Pinning action by SHA reason:"
    options:
      - A) Faster
      - B) Immutable — tag could be moved to malicious commit
      - C) Required by GitHub
      - D) Cleaner
    answer: 1
    hint: Supply chain.
    explanation: Tag mutability risk. See [[#Best Practices]].
  - id: jga-014
    type: single
    q: "Self-hosted ephemeral runner:"
    options:
      - A) Stays running
      - B) One job per runner, then destroyed → no state leak
      - C) Slower
      - D) UI only
    answer: 1
    hint: Isolation.
    explanation: Prevents cross-job contamination. See [[#Self-hosted Runners / Agents]].
  - id: jga-015
    type: single
    q: "Reusable workflow trigger:"
    options:
      - "A) `on: push`"
      - "B) `on: workflow_call`"
      - C) `uses:` only
      - D) `schedule`
    answer: 1
    hint: Callable.
    explanation: Other workflows invoke via `workflow_call`. See [[#Reusable
      Workflows + Composite Actions]].
  - id: jga-016
    type: single
    q: "Jenkins shared library purpose:"
    options:
      - A) Plugin
      - B) Reusable Groovy code (`vars/`) imported across pipelines
      - C) Build cache
      - D) Credentials store
    answer: 1
    hint: DRY pipelines.
    explanation: Centralizes pipeline logic. See [[#Shared Libraries]].
  - id: jga-017
    type: single
    q: "PR pipeline target time:"
    options:
      - A) 1 hour+
      - B) <10 min for fast feedback (lint + unit + smoke)
      - C) Always full e2e
      - D) None
    answer: 1
    hint: Dev productivity.
    explanation: Long PR CI tanks throughput. See [[#Best Practices]].
  - id: jga-018
    type: single
    q: "`workflow_dispatch` ="
    options:
      - A) Auto trigger
      - B) Manual run via UI/API with inputs
      - C) Cron
      - D) Webhook
    answer: 1
    hint: Manual.
    explanation: On-demand workflow. See [[#Triggers Comparison]].
  - id: jga-019
    type: single
    q: "GHA `environment: prod` benefit:"
    options:
      - A) Speed
      - B) Required reviewers + scoped secrets gate prod deploys
      - C) Free runners
      - D) Caches
    answer: 1
    hint: Approval gate.
    explanation: Environments enforce protection rules. See [[#Secrets Management]].
  - id: jga-020
    type: single
    q: "Flaky test in CI best response:"
    options:
      - A) Retry forever
      - B) Quarantine + investigate root cause (fix, not hide)
      - C) Delete
      - D) Ignore
    answer: 1
    hint: Root cause.
    explanation: |-
      Retries mask real bugs and erode trust. See [[#Common Pitfalls]].

      ---
