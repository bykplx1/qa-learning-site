lesson: istqb-expert-level
tasks:
  - id: iel-t001
    type: fill_blank
    q: "Fill: TMMi 5 levels = ______, Managed, ______, Measured, ______."
    answer: Initial / Defined / Optimization
    hint: Bottom, middle, top.
    explanation: Memorize ladder. See [[#TMMi (Test Maturity Model integration)]].
  - id: iel-t002
    type: fill_blank
    q: "Task: Outline a 3-year test capability roadmap for an org currently at TMMi
      L2."
    answer: >-
      - **Yr 1**: Establish org test process, training programme, standardize
      templates → reach L3 process areas (org test process, lifecycle, peer
      reviews, training, non-functional).

      - **Yr 2**: Build test measurement system, dashboards, product quality
      evaluation, advanced reviews → reach L4.

      - **Yr 3**: Launch defect prevention, test process optimization, quality
      control programmes → enter L5 trajectory; reassess externally.
    hint: L2 → L3 → L4 → L5.
    explanation: Demonstrates capability uplift planning. See [[#CTEL-TM Strategic]].
  - id: iel-t003
    type: fill_blank
    q: "Fill: IDEAL cycle = ______, ______, ______, ______, ______."
    answer: Initiate, Diagnose, Establish, Act, Learn
    hint: I-D-E-A-L.
    explanation: Improvement framework. See [[#Approach (IDEAL Cycle)]].
