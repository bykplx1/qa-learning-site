lesson: test-documentation
tasks:
  - id: td-t001
    type: fill_blank
    q: "Fill: The document that maps requirements to test cases and defects is
      called the _______."
    answer: Traceability Matrix (RTM)
    hint: Coverage map.
    explanation: A Requirements Traceability Matrix (RTM) links each requirement to its test cases and any related defects.
  - id: td-t002
    type: fill_blank
    q: "Fill: Conditions that must be satisfied before testing begins are called
      _______ criteria."
    answer: Entry
    hint: Gate to start.
    explanation: Entry criteria gate the start of a test cycle; without them teams begin testing on broken or incomplete builds.
  - id: td-t003
    type: fill_blank
    q: 'Task: Draft a test case for "user resets password via email link". Include
      ID, title, preconditions, data, steps, expected, priority, linked req.'
    answer: >-
      - ID: TC-AUTH-014

      - Title: Password reset via emailed link succeeds

      - Preconditions: user account active, mail inbox accessible

      - Test Data: user@x.com / new password "N3wPass!"

      - Steps: 1) /login → click "Forgot password" 2) enter email → submit 3)
      open email → click reset link 4) enter new password twice → submit 5)
      login with new password

      - Expected: step 2 shows "check email" toast; step 3 link opens reset
      form; step 4 redirects to /login with success banner; step 5 redirects to
      /dashboard

      - Postconditions: old password invalid; reset link consumed

      - Priority: High

      - Type: Functional

      - Linked Req: REQ-AUTH-09
    hint: Use anatomy table fields.
    explanation: A complete test case (ID, title, preconditions, data, steps, expected, priority, linked req) is verifiable and traceable.
