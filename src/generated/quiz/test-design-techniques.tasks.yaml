lesson: test-design-techniques
tasks:
  - id: tdt-t001
    type: fill_blank
    q: "Fill: For input range [1, 100], BVA tests at minimum the values _______."
    answer: 0, 1, 2, 99, 100, 101 (boundaries + just outside + just inside)
    hint: Edges + neighbors.
    explanation: BVA captures off-by-one and boundary defects by testing at, just inside, and just outside range edges.
  - id: tdt-t002
    type: fill_blank
    q: "Fill: The coverage type required by DO-178C for safety-critical avionics is
      _______."
    answer: MC/DC
    hint: Modified Condition/Decision.
    explanation: MC/DC requires each boolean condition's independent effect on the decision outcome to be demonstrated — mandatory for DO-178C Level A.
  - id: tdt-t003
    type: fill_blank
    q: "Task: Build decision table for a discount rule: members get 10%, orders
      ≥$100 get 5%, both stack to 15%."
    answer: |-
      | Member? | Order ≥ $100? | Discount |
      |---------|---------------|----------|
      | Y | Y | 15% |
      | Y | N | 10% |
      | N | Y | 5% |
      | N | N | 0% |
    hint: 2 conditions → 2² rows.
    explanation: A decision table enumerates all rule combinations explicitly, ensuring no condition interaction is missed.
