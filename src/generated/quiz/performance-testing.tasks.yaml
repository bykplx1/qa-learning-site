lesson: performance-testing
tasks:
  - id: pt-t001
    type: fill_blank
    q: "Fill: Test that runs over many hours to expose memory leaks is called
      _______."
    answer: Soak (Endurance)
    hint: Long duration.
    explanation: Soak (endurance) testing runs for many hours to reveal slow degradation like memory leaks.
  - id: pt-t002
    type: fill_blank
    q: "Task: Define a k6 threshold so the test fails when P95 latency exceeds 500ms
      or error rate exceeds 1%."
    answer: |-
      ```js
      thresholds: {
        http_req_duration: ['p(95)<500'],
        http_req_failed: ['rate<0.01'],
      }
      ```
    hint: "`thresholds` block."
    explanation: k6 `thresholds` codify the SLO into the test so it fails automatically when the target is missed.
  - id: pt-t003
    type: fill_blank
    q: 'Fill: Internal target like "99% requests under 300ms" is an _______ (3
      letters).'
    answer: SLO
    hint: Objective.
    explanation: SLO (Service Level Objective) is the internal engineering target derived from SLIs, stricter than the customer-facing SLA.
