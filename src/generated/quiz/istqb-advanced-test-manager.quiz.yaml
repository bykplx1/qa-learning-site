lesson: istqb-advanced-test-manager
questions:
  - id: iatm-001
    type: single
    q: Risk =
    options:
      - A) Severity alone
      - B) Likelihood × Impact
      - C) Defect count
      - D) Coverage
    answer: 1
    hint: Two-factor.
    explanation: Standard formula. See [[#Risk-Based Test Mgmt]].
  - id: iatm-002
    type: single
    q: Defect Removal Efficiency =
    options:
      - A) defects-found / total-tests
      - B) defects-found-pre-release / (pre + post-release)
      - C) post-release / pre-release
      - D) tests-passed / tests-run
    answer: 1
    hint: Pre / total.
    explanation: Industry-standard DRE. See [[#Defect Lifecycle Mgmt]].
  - id: iatm-003
    type: single
    q: "TMMi level 5:"
    options:
      - A) Managed
      - B) Defined
      - C) Measured
      - D) Optimization
    answer: 3
    hint: Top.
    explanation: L5 = Optimization. See [[#Test Process Improvement]].
  - id: iatm-004
    type: single
    q: "External failure cost example:"
    options:
      - A) Code review
      - B) Production incident, customer refund
      - C) Pre-release rework
      - D) Static analysis tool license
    answer: 1
    hint: Customer-facing.
    explanation: Most expensive cost-of-quality bucket. See [[#Cost of Quality]].
  - id: iatm-005
    type: single
    q: "Three-point estimation formula:"
    options:
      - A) (O + L + P)/3
      - B) (O + 4L + P)/6
      - C) (O + 2L + P)/4
      - D) Average of two
    answer: 1
    hint: PERT.
    explanation: Beta distribution mean. See [[#Estimation Techniques]].
  - id: iatm-006
    type: single
    q: "Wideband Delphi key feature:"
    options:
      - A) Single estimator
      - B) Iterative anonymous expert estimates with discussion
      - C) Customer poll
      - D) Bid-based
    answer: 1
    hint: Anonymous rounds.
    explanation: Reduces dominance bias. See [[#Estimation Techniques]].
  - id: iatm-007
    type: single
    q: "Reactive strategy used when:"
    options:
      - A) Stable mature product
      - B) Late info / unstable system / exploratory needed
      - C) Compliance only
      - D) Greenfield
    answer: 1
    hint: React to events.
    explanation: Reactive fits late-arriving info. See [[#Test Strategy Types]].
  - id: iatm-008
    type: single
    q: "Process-compliant strategy fits:"
    options:
      - A) Hackathon
      - B) Regulated industries (pharma, banking)
      - C) Internal tools
      - D) MVPs
    answer: 1
    hint: Standards-driven.
    explanation: Required for regulated environments. See [[#Test Strategy Types]].
  - id: iatm-009
    type: single
    q: "Cost-of-quality categories:"
    options:
      - A) 2
      - B) 3
      - C) 4
      - D) 5
    answer: 2
    hint: Prevention/appraisal/internal/external failure.
    explanation: Four buckets. See [[#Cost of Quality]].
  - id: iatm-010
    type: single
    q: "ISO 29119 covers:"
    options:
      - A) Software lifecycle
      - B) Software testing
      - C) Security
      - D) Risk
    answer: 1
    hint: Testing standard.
    explanation: Multi-part testing standard. See [[#Standards & Compliance]].
  - id: iatm-011
    type: single
    q: "ISO 25010 quality model NOT include:"
    options:
      - A) Functional Suitability
      - B) Reliability
      - C) Throughput
      - D) Maintainability
    answer: 2
    hint: Throughput is a metric, not a category.
    explanation: "ISO 25010 categories: FS, Performance Eff, Compatibility,
      Usability, Reliability, Security, Maintainability, Portability. See
      [[#Standards & Compliance]]."
  - id: iatm-012
    type: single
    q: "Highest-leverage test mgmt artefact for cross-project consistency:"
    options:
      - A) Bug report
      - B) Test policy / strategy
      - C) Test case
      - D) Run log
    answer: 1
    hint: Org-level.
    explanation: Strategy spans projects. See [[#Test Policy → Strategy → Plan]].
  - id: iatm-013
    type: single
    q: "Inspection most cost-effective at:"
    options:
      - A) Production
      - B) Late testing
      - C) Early reqs/design defects
      - D) Refactoring
    answer: 2
    hint: Shift-left.
    explanation: Cheapest defect removal. See [[#Reviews from Mgmt View]].
  - id: iatm-014
    type: single
    q: "Distributed team biggest risk:"
    options:
      - A) Hardware
      - B) Comms / time-zone / knowledge silos
      - C) Salary
      - D) Tooling
    answer: 1
    hint: Coordination.
    explanation: Distance taxes communication. See [[#Outsourcing / Distributed Teams]].
  - id: iatm-015
    type: single
    q: Tool ROI =
    options:
      - A) Tool cost / saved-hours
      - B) (Manual effort saved − tool TCO) / tool TCO
      - C) Tool sale price
      - D) Vendor margin
    answer: 1
    hint: Net benefit / cost.
    explanation: Investment ratio. See [[#Tool Strategy]].
  - id: iatm-016
    type: single
    q: "Risk register field NOT typically:"
    options:
      - A) Likelihood
      - B) Impact
      - C) Owner
      - D) Test data row count
    answer: 3
    hint: Not a risk attribute.
    explanation: Standard register fields. See [[#Risk-Based Test Mgmt]].
  - id: iatm-017
    type: single
    q: "Defect triage decides:"
    options:
      - A) Schedule
      - B) Priority + severity + assignment
      - C) Tool choice
      - D) Team size
    answer: 1
    hint: Bug routing.
    explanation: Triage outcomes. See [[#Defect Lifecycle Mgmt]].
  - id: iatm-018
    type: single
    q: "Process improvement model practitioner-driven:"
    options:
      - A) TMMi
      - B) TPI Next
      - C) CTP
      - D) ISO 29119
    answer: 2
    hint: Critical Testing Processes.
    explanation: Black/Veenendaal CTP. See [[#Test Process Improvement]].
  - id: iatm-019
    type: single
    q: "Test Policy owner typically:"
    options:
      - A) Junior tester
      - B) Head of QA / CIO
      - C) Dev lead
      - D) Sales
    answer: 1
    hint: Org-level artefact.
    explanation: Policy spans org. See [[#Test Policy → Strategy → Plan]].
  - id: iatm-020
    type: single
    q: "Master Test Plan vs Level Test Plan:"
    options:
      - A) Same
      - B) Master spans programme; Level focused on a level (system/UAT)
      - C) Master is per sprint
      - D) Level is org-wide
    answer: 1
    hint: Hierarchy.
    explanation: |-
      IEEE 829 / 29119-3 hierarchy. See [[#Documentation Suite]].

      ---
