lesson: cucumber-bdd
tasks:
  - id: cb-t001
    type: fill_blank
    q: "Fill: Steps before every scenario in a feature go under keyword `______`."
    answer: Background
    hint: Shared setup.
    explanation: Avoids repetition. See [[#Keywords]].
  - id: cb-t002
    type: fill_blank
    q: "Task: Write a Scenario Outline for login with two examples (valid/invalid)
      producing dashboard or error."
    answer: |-
      ```gherkin
      Scenario Outline: login
        When I enter username "<u>" and password "<p>"
        Then I see "<msg>"

        Examples:
          | u   | p      | msg        |
          | ada | secret | dashboard  |
          | ada | bad    | Bad password |
      ```
    hint: "`<placeholders>` + Examples table."
    explanation: Data-driven scenarios. See [[#Gherkin Syntax]].
  - id: cb-t003
    type: fill_blank
    q: 'Fill: Run only `@smoke` scenarios in cucumber-js: `npx cucumber-js --tags
      "______"`.'
    answer: "@smoke"
    hint: Tag expression.
    explanation: CLI tag filter. See [[#Tags + Filters]].
