lesson: ai-testing
tasks:
  - id: at-t001
    type: fill_blank
    q: "Fill: Statistic that measures distribution shift between training and
      production data is _______."
    answer: PSI (Population Stability Index) or KS test
    hint: Drift metric.
    explanation: PSI and KS test are standard tools for detecting covariate drift between training and production distributions.
  - id: at-t002
    type: fill_blank
    q: "Task: Write a Promptfoo assertion that ensures the model's response contains
      \"Paris\" when asked \"What is the capital of France?\""
    answer: |-
      ```yaml
      tests:
        - vars: { question: "What is the capital of France?" }
          assert:
            - type: contains
              value: "Paris"
      ```
    hint: "`contains` assertion."
    explanation: A `contains` property assertion in Promptfoo verifies factual correctness by checking the model output.
  - id: at-t003
    type: fill_blank
    q: "Fill: Adversarial input that overrides system instructions in an LLM is
      called _______."
    answer: Prompt injection
    hint: "OWASP LLM Top 10 #1."
    explanation: Prompt injection = adversarial user input that overrides the LLM's system instructions (#1 on OWASP LLM Top 10).
