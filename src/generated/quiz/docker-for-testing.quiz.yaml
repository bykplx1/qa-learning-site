lesson: docker-for-testing
questions:
  - id: dft-001
    type: single
    q: "Image vs container:"
    options:
      - A) Same thing
      - B) Image is immutable artifact; container is running instance
      - C) Container builds image
      - D) Image runs
    answer: 1
    hint: Class vs object.
    explanation: Image = template; container = running instance. See [[#Core Concepts]].
  - id: dft-002
    type: single
    q: "Multi-stage Dockerfile primary benefit:"
    options:
      - A) Faster runtime
      - B) Smaller final image — build deps stay in earlier stage
      - C) Required syntax
      - D) Multi-arch only
    answer: 1
    hint: Layer separation.
    explanation: Final stage copies only artifacts. See [[#Dockerfile (App + Test Image)]].
  - id: dft-003
    type: single
    q: "`.dockerignore` purpose:"
    options:
      - A) Ignore Dockerfile
      - B) Exclude paths from build context (faster, smaller image)
      - C) Ignore secrets
      - D) Skip tests
    answer: 1
    hint: Build context.
    explanation: Reduces context sent to daemon. See [[#Image Hygiene]].
  - id: dft-004
    type: single
    q: "Compose service name resolves via:"
    options:
      - A) localhost
      - B) Service name as DNS hostname on the network
      - C) IP only
      - D) /etc/hosts edits
    answer: 1
    hint: Built-in DNS.
    explanation: Compose creates DNS for each service. See [[#Networking]].
  - id: dft-005
    type: single
    q: "`depends_on.condition: service_healthy` requires:"
    options:
      - A) Nothing
      - B) Healthcheck defined on dependency
      - C) Restart policy
      - D) Volume
    answer: 1
    hint: Healthcheck.
    explanation: Condition reads health status. See [[#Docker Compose for Test Env]].
  - id: dft-006
    type: single
    q: "Testcontainers main advantage:"
    options:
      - A) Faster than mocks
      - B) Real services, lifecycle tied to test, auto-cleanup
      - C) No setup
      - D) UI only
    answer: 1
    hint: Real deps.
    explanation: Programmatic ephemeral containers per test. See [[#Testcontainers
      (Java / Python / JS / Go)]].
  - id: dft-007
    type: single
    q: "Chrome `--shm-size` issue:"
    options:
      - A) Network
      - B) Default 64MB shared memory crashes browser; bump to 2g
      - C) Disk
      - D) CPU
    answer: 1
    hint: Shared memory.
    explanation: Chrome heavy on /dev/shm. See [[#Resource Limits + Determinism]].
  - id: dft-008
    type: single
    q: "DinD vs DooD:"
    options:
      - A) Same
      - B) DinD = nested daemon; DooD = mount host socket — DooD lighter but
        escapes container
      - C) Both safe
      - D) DinD faster
    answer: 1
    hint: Trade-off.
    explanation: DooD shares host docker; security risk. See [[#CI Integration]].
  - id: dft-009
    type: single
    q: "Pin `python:3.12-slim` not `python:latest` because:"
    options:
      - A) Smaller
      - B) Reproducibility — `latest` floats and breaks builds
      - C) Security only
      - D) Required
    answer: 1
    hint: Determinism.
    explanation: "`latest` is mutable. See [[#Image Hygiene]]."
  - id: dft-010
    type: single
    q: "Volume vs bind mount:"
    options:
      - A) Same
      - B) Volume = Docker-managed; bind = host path
      - C) Bind faster always
      - D) Volumes ephemeral only
    answer: 1
    hint: Origin.
    explanation: Bind ties to host filesystem. See [[#Volumes vs Bind Mounts]].
  - id: dft-011
    type: single
    q: "`docker run --rm`:"
    options:
      - A) Remove image
      - B) Auto-remove container on exit
      - C) Force restart
      - D) Read-only
    answer: 1
    hint: Cleanup.
    explanation: Prevents leaked stopped containers. See [[#Cleanup Strategies]].
  - id: dft-012
    type: single
    q: "Run e2e against playwright official image:"
    options:
      - A) Build from scratch
      - B) `mcr.microsoft.com/playwright:vX-jammy` ships browsers
      - C) Need Selenium
      - D) Headed only
    answer: 1
    hint: Prebuilt.
    explanation: Saves browser install time. See [[#Browser Testing in Docker]].
  - id: dft-013
    type: single
    q: "Secret leak via:"
    options:
      - A) Healthcheck
      - B) Baking into image (`docker history` reveals layers)
      - C) Volume
      - D) Network
    answer: 1
    hint: Layer history.
    explanation: Layers persist secrets. See [[#Security Notes]].
  - id: dft-014
    type: single
    q: "M1 Mac local pass / CI fail likely cause:"
    options:
      - A) Network
      - B) ARM vs x86 image — pin `--platform linux/amd64`
      - C) DNS
      - D) Disk
    answer: 1
    hint: Architecture.
    explanation: Multi-arch mismatch. See [[#Common Pitfalls]].
  - id: dft-015
    type: single
    q: "Compose profile use:"
    options:
      - A) Logging
      - B) Conditionally include services (`docker compose --profile e2e up`)
      - C) Auth
      - D) Rebuild
    answer: 1
    hint: Conditional.
    explanation: Skip heavy services in normal runs. See [[#Compose Patterns]].
  - id: dft-016
    type: single
    q: "Best wait-for-DB pattern:"
    options:
      - A) `sleep 30`
      - B) Healthcheck + `depends_on.condition`
      - C) Retry forever
      - D) Manual
    answer: 1
    hint: Deterministic.
    explanation: Health-based gating. See [[#Compose Patterns]].
  - id: dft-017
    type: single
    q: "tmpfs benefit for test DB:"
    options:
      - A) Persistent
      - B) In-memory, fast, ephemeral — clean state per run
      - C) Larger
      - D) Encrypted
    answer: 1
    hint: RAM disk.
    explanation: Speed + isolation. See [[#Volumes vs Bind Mounts]].
  - id: dft-018
    type: single
    q: "Image scanning tool:"
    options:
      - A) docker logs
      - B) trivy / docker scout cves
      - C) compose
      - D) prune
    answer: 1
    hint: CVE scanner.
    explanation: Static vulnerability detection. See [[#Security Notes]].
  - id: dft-019
    type: single
    q: "`docker compose down -v` does:"
    options:
      - A) Stop only
      - B) Stop + remove containers, networks, AND named volumes
      - C) Verbose
      - D) Restart
    answer: 1
    hint: "`-v` = volumes."
    explanation: Full cleanup including state. See [[#Cleanup Strategies]].
  - id: dft-020
    type: single
    q: "Test container should exit with:"
    options:
      - A) Always 0
      - B) Test runner's exit code so CI fails when tests fail
      - C) Random
      - D) 1
    answer: 1
    hint: Propagate.
    explanation: |-
      CI relies on container exit code. See [[#Best Practices]].

      ---
