    explanation: Decision-support framing. See [[#Modern Testing Principles
      (Bach/Bolton/Rosa-Bilbao)]].
  - id: cp-020
    type: single
    q: "IC ladder cap:"
    options:
      - A) Senior
      - B) Continues to Staff/Principal/Architect
      - C) Mandatory mgmt switch
