lesson: istqb-advanced-test-analyst
tasks:
  - id: iata-t001
    type: fill_blank
    q: "Fill: WCAG principles = ______, ______, ______, ______."
    answer: Perceivable, Operable, Understandable, Robust
    hint: POUR.
    explanation: A11y backbone. See [[#Accessibility (TA scope)]].
  - id: iata-t002
    type: fill_blank
    q: 'Task: Build a decision table for "Apply discount" with conditions:
      HasCoupon, IsMember, Cart>$100. Show actions for each rule.'
    answer: |-
      | # | HasCoupon | IsMember | Cart>$100 | Action |
      |---|-----------|----------|-----------|--------|
      | 1 | T | T | T | 25% off |
      | 2 | T | T | F | 15% off |
      | 3 | T | F | T | 15% off |
      | 4 | T | F | F | 10% off |
      | 5 | F | T | T | 10% off |
      | 6 | F | T | F | 5% off |
      | 7 | F | F | T | 5% off |
      | 8 | F | F | F | None |
    hint: 2^3 = 8.
    explanation: Practice combinational design. See [[#Decision Tables]].
  - id: iata-t003
    type: fill_blank
    q: "Fill: 3-value BVA for input range 1–100 lower boundary = ______, ______,
      ______."
    answer: 0, 1, 2
    hint: ±1 around min.
    explanation: Standard 3-value method. See [[#Boundary Value Analysis (BVA)]].
