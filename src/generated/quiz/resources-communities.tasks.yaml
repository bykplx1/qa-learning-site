  - id: rc-t002
    type: fill_blank
    q: "Task: Sketch a 6-month community-engagement plan for a mid-level QA aiming
      to grow a senior brand."
    answer: >-
      - Month 1: join MoT Club + 1 specialty Slack ([[Playwright]] or k6); lurk
      + answer 5 questions.

      - Month 2: write 1 blog post (bug post-mortem or framework comparison);
      cross-share to MoT.

      - Month 3: open 1 docs PR to a tool you use ([[#Open Source to Contribute
      To]]); attend 1 local meetup.

      - Month 4: brown-bag at work â€” share one learning broadly.

      - Month 5: submit a lightning talk to a meetup; subscribe to Pragmatic
      Engineer + Test Guild Weekly.

      - Month 6: present talk; reflect; pick 1 mentor (ADPList) + 1 mentee.

      - Throughout: 1 thoughtful LinkedIn comment per workday.
    hint: One channel per month, maintain.
    explanation: Compounds; visible. See [[#Networking ROI]] and
      [[Career-Path#Building a Portfolio]].
  - id: rc-t003
    type: fill_blank
    q: "Fill: Personal brand minimum â€” pick ____ of (repo / blog / LinkedIn /
      talk) and ____ it."
    answer: one / maintain
    hint: Sustainability over scope.
    explanation: Consistency wins. See [[#Building Your Personal Brand (Lightweight)]].
