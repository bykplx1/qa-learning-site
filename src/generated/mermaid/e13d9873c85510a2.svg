ess-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_S2_S3_0" data-points="W3sieCI6NTIzLCJ5Ijo3ODh9LHsieCI6NTIzLCJ5Ijo4MTN9LHsieCI6NTIzLCJ5Ijo4Mzh9XQ==" data-look="classic" marker-end="url(#me13d9873c85510a2-0_flowchart-v2-pointEnd)"/><path d="M523,1108L523,1112.167C523,1116.333,523,1124.667,523,1132.333C523,1140,523,1147,523,1150.5L523,1154" id="me13d9873c85510a2-0-L_S3_S4_0" class="edge-thickness-normal edge-pattern-solid edge-thickness-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_S3_S4_0" data-points="W3sieCI6NTIzLCJ5IjoxMTA4fSx7IngiOjUyMywieSI6MTEzM30seyJ4Ijo1MjMsInkiOjExNTh9XQ==" data-look="classic" marker-end="url(#me13d9873c85510a2-0_flowchart-v2-pointEnd)"/><path d="M523,1452L523,1456.167C523,1460.333,523,1468.667,523,1476.333C523,1484,523,1491,523,1494.5L523,1498" id="me13d9873c85510a2-0-L_S4_S5_0" class="edge-thickness-normal edge-pattern-solid edge-thickness-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_S4_S5_0" data-points="W3sieCI6NTIzLCJ5IjoxNDUyfSx7IngiOjUyMywieSI6MTQ3N30seyJ4Ijo1MjMsInkiOjE1MDJ9XQ==" data-look="classic" marker-end="url(#me13d9873c85510a2-0_flowchart-v2-pointEnd)"/></g><g class="edgeLabels"><g class="edgeLabel"><g class="label" data-id="L_S1_S2_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_S2_S3_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_S3_S4_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_S4_S5_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="root" transform="translate(0, 0)"><g class="clusters"><g class="cluster" id="me13d9873c85510a2-0-MET" data-look="classic"><rect style="" x="8" y="8" width="335" height="436"/><g class="cluster-label" transform="translate(73.6875, 8)"><foreignObject width="203.625" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Four Canonical RAG Metrics</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="me13d9873c85510a2-0-flowchart-M-10" data-look="classic" transform="translate(175.5, 226)"><rect class="basic label-container" style="" x="-130" y="-183" width="260" height="366"/><g class="label" style="" transform="translate(-100, -168)"><rect/><foreignObject width="200" height="336"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>context recall → retrieval: right chunk in top-k?<br />context precision → retrieval: fraction of retrieved chunks relevant?<br />faithfulness → generation: answer grounded in retrieved chunks?<br />answer relevance → generation: answer addresses the question?<br />Faithfulness ≠ Correctness: RAG quality ≤ corpus quality</p></span></div></foreignObject></g></g></g></g><g class="node default" id="me13d9873c85510a2-0-flowchart-S1-0" data-look="classic" transform="translate(523, 226)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>1. INGESTION<br />Pull source documents into the system<br />Failure modes: missed · corrupted · stale · duplicated · mis-attributed<br />Test signal: document count before/after · diff against source manifest</p></span></div></foreignObject></g></g><g class="node default" id="me13d9873c85510a2-0-flowchart-S2-1" data-look="classic" transform="translate(523, 641)"><rect class="basic label-container" style="" x="-130" y="-147" width="260" height="294"/><g class="label" style="" transform="translate(-100, -132)"><rect/><foreignObject width="200" height="264"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>2. CHUNKING<br />Split documents into retrievable units<br />Failure modes: too small/large · cut mid-thought · header lost · attribution dropped<br />Test signal: chunk boundary review · coverage assertions on known phrases</p></span></div></foreignObject></g></g><g class="node default" id="me13d9873c85510a2-0-flowchart-S3-2" data-look="classic" transform="translate(523, 973)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>3. EMBEDDING<br />Convert each chunk into a vector<br />Failure modes: wrong model · mixed vectors after upgrade · query-doc asymmetry<br />Test signal: embedding version logged · cosine sanity checks</p></span></div></foreignObject></g></g><g class="node default" id="me13d9873c85510a2-0-flowchart-S4-3" data-look="classic" transform="translate(523, 1305)"><rect class="basic label-container" style="" x="-130" y="-147" width="260" height="294"/><g class="label" style="" transform="translate(-100, -132)"><rect/><foreignObject width="200" height="264"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>4. RETRIEVAL + optional RERANKER<br />Find top-k chunks for a query<br />Retriever: recall@k — did right chunk appear in top-k?<br />Reranker: precision@k — is right chunk at position 1-5?<br />Test signal: recall@k · precision@k · MRR</p></span></div></foreignObject></g></g><g class="node default" id="me13d9873c85510a2-0-flowchart-S5-4" data-look="classic" transform="translate(523, 1697)"><rect class="basic label-container" style="" x="-130" y="-195" width="260" height="390"/><g class="label" style="" transform="translate(-100, -180)"><rect/><foreignObject width="200" height="360"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>5. GENERATION<br />Model produces answer grounded in retrieved chunks<br />Faithfulness: did answer come FROM retrieved context?<br />Answer relevance: does answer address the question?<br />Correctness: is the answer factually right?<br />Refusal: does system say 'I don't know' when corpus lacks answer?</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="me13d9873c85510a2-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="me13d9873c85510a2-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="me13d9873c85510a2-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl(0, 0%, 88.9215686275%)" stop-opacity="1"/></linearGradient></svg>