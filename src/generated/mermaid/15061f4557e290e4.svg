ml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_FT_SR_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_FT_OW_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="root" transform="translate(310, 1008)"><g class="clusters"><g class="cluster" id="m15061f4557e290e4-0-OW" data-look="classic"><rect style="" x="8" y="8" width="335" height="388"/><g class="cluster-label" transform="translate(94.7109375, 8)"><foreignObject width="161.578125" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>OWASP Top 10 (2021)</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m15061f4557e290e4-0-flowchart-O-4" data-look="classic" transform="translate(175.5, 202)"><rect class="basic label-container" style="" x="-130" y="-159" width="260" height="318"/><g class="label" style="" transform="translate(-100, -144)"><rect/><foreignObject width="200" height="288"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>A01 Broken Access Control (highest-ROI QA target)<br />A02 Cryptographic Failures · A03 Injection<br />A04 Insecure Design · A05 Security Misconfiguration<br />A06 Vulnerable Components · A07 AuthN Failures<br />A08 Software Integrity Failures · A09 Logging Failures · A10 SSRF</p></span></div></foreignObject></g></g></g></g><g class="node default" id="m15061f4557e290e4-0-flowchart-STRIDE-0" data-look="classic" transform="translate(311.75, 107)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>THREAT MODEL (STRIDE)<br />Spoofing · Tampering · Repudiation<br />Info Disclosure · DoS · Elevation of Privilege<br />→ each threat becomes a test case</p></span></div></foreignObject></g></g><g class="node default" id="m15061f4557e290e4-0-flowchart-SL-1" data-look="classic" transform="translate(311.75, 403)"><rect class="basic label-container" style="" x="-130" y="-147" width="260" height="294"/><g class="label" style="" transform="translate(-100, -132)"><rect/><foreignObject width="200" height="264"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>SHIFT-LEFT (static / pre-run)<br />SAST: CodeQL, Semgrep — code-level injection, hardcoded keys<br />SCA: Snyk, npm audit — dependencies, known CVEs, supply chain<br />Secrets: gitleaks, trufflehog — commit history + pre-commit hook</p></span></div></foreignObject></g></g><g class="node default" id="m15061f4557e290e4-0-flowchart-FT-2" data-look="classic" transform="translate(311.75, 783)"><rect class="basic label-container" style="" x="-130" y="-183" width="260" height="366"/><g class="label" style="" transform="translate(-100, -168)"><rect/><foreignObject width="200" height="336"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>FUNCTIONAL TESTS with adversarial oracles<br />AuthN: rate-limit · session rotation · timing-leak · JWT pitfalls<br />AuthZ: role × endpoint × resource matrix (BOLA / IDOR focus)<br />OWASP: XSS · SQLi · SSRF · CORS · headers · CSRF<br />Tooling: Playwright (header assertions, multi-role fixtures) · Burp Suite · ZAP</p></span></div></foreignObject></g></g><g class="node default" id="m15061f4557e290e4-0-flowchart-SR-3" data-look="classic" transform="translate(138, 1210)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>SHIFT-RIGHT (dynamic / running app)<br />DAST: OWASP ZAP 2.15.0 — reflected XSS, SQLi, missing headers<br />Manual exploration fills scanner blind spots<br />ZAP flow: Spider → Passive scan → HTML+JSON report</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="m15061f4557e290e4-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="m15061f4557e290e4-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="m15061f4557e290e4-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl