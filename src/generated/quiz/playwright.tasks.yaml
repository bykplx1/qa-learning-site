lesson: playwright
tasks:
  - id: p-t001
    type: fill_blank
    q: 'Fill: To enable auto-trace on retry, set `use.trace = "______"` in config.'
    answer: on-first-retry
    hint: Common CI setting.
    explanation: `on-first-retry` balances trace cost vs debugging value — trace only collected when the test first fails.
  - id: p-t002
    type: fill_blank
    q: 'Task: Write a Playwright test that intercepts `/api/users` and returns
      `[{id:1,name:"Ada"}]`.'
    answer: >-
      ```ts

      test("mock users", async ({ page }) => {
        await page.route("**/api/users", r => r.fulfill({ json: [{id:1,name:"Ada"}] }));
        await page.goto("/users");
        await expect(page.getByText("Ada")).toBeVisible();
      });

      ```
    hint: "`page.route` + `route.fulfill`."
    explanation: `page.route` + `route.fulfill` is the standard Playwright pattern for network interception and mocking.
  - id: p-t003
    type: fill_blank
    q: "Fill: Run only chromium project: `npx playwright test --project=______`."
    answer: chromium
    hint: Matches config name.
    explanation: `--project=chromium` filters the Playwright suite to only run the named project from playwright.config.ts.
