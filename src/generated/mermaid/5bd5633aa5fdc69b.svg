m5bd5633aa5fdc69b-0_flowchart-v2-crossEnd" class="marker cross flowchart-v2" viewBox="0 0 11 11" refX="12" refY="5.2" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" orient="auto"><path d="M 1,1 l 9,9 M 10,1 l -9,9" class="arrowMarkerPath" style="stroke-width: 2; stroke-dasharray: 1, 0;"/></marker><marker id="m5bd5633aa5fdc69b-0_flowchart-v2-crossStart" class="marker cross flowchart-v2" viewBox="0 0 11 11" refX="-1" refY="5.2" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" orient="auto"><path d="M 1,1 l 9,9 M 10,1 l -9,9" class="arrowMarkerPath" style="stroke-width: 2; stroke-dasharray: 1, 0;"/></marker><marker id="m5bd5633aa5fdc69b-0_flowchart-v2-crossEnd-margin" class="marker cross flowchart-v2" viewBox="0 0 15 15" refX="17.7" refY="7.5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M 1,1 L 14,14 M 1,14 L 14,1" class="arrowMarkerPath" style="stroke-width: 2.5;"/></marker><marker id="m5bd5633aa5fdc69b-0_flowchart-v2-crossStart-margin" class="marker cross flowchart-v2" viewBox="0 0 15 15" refX="-3.5" refY="7.5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M 1,1 L 14,14 M 1,14 L 14,1" class="arrowMarkerPath" style="stroke-width: 2.5; stroke-dasharray: 1, 0;"/></marker><g class="root"><g class="clusters"/><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="root" transform="translate(0, 368)"><g class="clusters"><g class="cluster" id="m5bd5633aa5fdc69b-0-WM" data-look="classic"><rect style="" x="8" y="8" width="335" height="444"/><g class="cluster-label" transform="translate(117.84375, 8)"><foreignObject width="115.3125" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Workload Model</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-WM1-5" data-look="classic" transform="translate(175.5, 130)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"/><g class="label" style="" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Closed (constant-vus): N VUs wait for response → send next<br />→ under-reports tail latency (coordinated omission)</p></span></div></foreignObject></g></g><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-WM2-6" data-look="classic" transform="translate(175.5, 342)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Open (constant-arrival-rate): requests arrive at fixed rate<br />→ models real traffic; exposes true tail latency</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(423.3984375, 468)"><g class="clusters"><g class="cluster" id="m5bd5633aa5fdc69b-0-PR" data-look="classic"><rect style="" x="-30.3984375" y="8" width="411.796875" height="244"/><g class="cluster-label" transform="translate(-26.3984375, 8)"><foreignObject width="403.796875" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Reading Results — always p50/p95/p99, never averages</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-P-4" data-look="classic" transform="translate(175.5, 130)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"/><g class="label" style="" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>990 req @ 50ms + 10 req @ 5000ms<br />Average: ~100ms (hides the pain)<br />p50: 50ms · p95: 50ms · p99: 5000ms (truth)</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(846.796875, 0)"><g class="clusters"><g class="cluster" id="m5bd5633aa5fdc69b-0-WS" data-look="classic"><rect style="" x="8" y="8" width="335" height="1180"/><g class="cluster-label" transform="translate(23.28125, 8)"><foreignObject width="304.4375" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Four Workload Shapes — POST /checkout</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-LT-0" data-look="classic" transform="translate(175.5, 154)"><rect class="basic label-container" style="" x="-130" y="-111" width="260" height="222"/><g class="label" style="" transform="translate(-100, -96)"><rect/><foreignObject width="200" height="192"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>LOAD TEST — Steady-state at expected peak<br />500 VU, 30 min hold<br />Answers: Does the system meet SLOs under planned load?<br />Catches: SLO breach, connection-pool saturation</p></span></div></foreignObject></g></g><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-ST-1" data-look="classic" transform="translate(175.5, 438)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>STRESS TEST — Ramp beyond peak until break<br />0 → 5000 VU over 30 min<br />Answers: Where does the system break, how does it fail?<br />Catches: capacity ceiling, graceful-vs-cliff failure, cascades</p></span></div></foreignObject></g></g><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-SO-2" data-look="classic" transform="translate(175.5, 734)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>SOAK TEST — Moderate load for hours/days<br />200 VU, 8 hours<br />Answers: Are there leaks, accumulating queues, GC pauses?<br />Catches: memory leaks, pool exhaustion, log-volume blow-up</p></span></div></foreignObject></g></g><g class="node default" id="m5bd5633aa5fdc69b-0-flowchart-SP-3" data-look="classic" transform="translate(175.5, 1030)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>SPIKE TEST — Instantaneous step-up<br />50 VU → 2000 VU at t=5 min, back at t=10 min<br />Answers: Does autoscaling react in time?<br />Catches: autoscaling lag, connection-pool pre-warming gaps</p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="m5bd5633aa5fdc69b-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="m5bd5633aa5fdc69b-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="m5bd5633aa5fdc69b-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl(0, 0%, 88.9215686275%)" stop-opacity="1"/></linearGradient></svg>