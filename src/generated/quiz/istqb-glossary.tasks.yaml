lesson: istqb-glossary
tasks:
  - id: ig-t001
    type: fill_blank
    q: "Fill: Risk = ______ × ______."
    answer: Likelihood / Impact (or probability / impact)
    hint: Two-factor.
    explanation: Standard formula. See [[#Risk]].
  - id: ig-t002
    type: fill_blank
    q: "Task: Fill the verification vs validation matrix with one example each at
      unit and acceptance level."
    answer: >-
      | Level | Verification | Validation |

      |-------|--------------|------------|

      | Unit | Function returns correct sum per spec | (rare at unit; spec
      compliance assumed = user need) |

      | System | Feature matches reqs spec | E2E flow meets user goal |

      | Acceptance | Trace AC to delivered behavior | Beta users complete
      intended task |
    hint: Spec vs need.
    explanation: Both apply at all levels but emphasis differs. See [[#Verification
      vs Validation]].
  - id: ig-t003
    type: fill_blank
    q: "Fill: Test doubles ladder = ______, ______, Stub, Spy, ______."
    answer: Dummy / Fake / Mock
    hint: Five-level taxonomy.
    explanation: Memorize ordering. See [[#Test Doubles (Mocking Hierarchy)]].
