lesson: docker-for-testing
tasks:
  - id: dft-t001
    type: fill_blank
    q: "Fill: Build only the `test` stage of multi-stage Dockerfile = `docker build
      --______ test -t app-test .`"
    answer: target
    hint: Stage flag.
    explanation: Builds up to named stage. See [[#Dockerfile (App + Test Image)]].
  - id: dft-t002
    type: fill_blank
    q: "Task: Write Compose snippet starting Postgres 16 + a `tests` service that
      waits for DB healthy then runs pytest, mounting `./reports` for
      junit.xml."
    answer: |-
      ```yaml
      services:
        db:
          image: postgres:16
          environment: { POSTGRES_PASSWORD: pw }
          healthcheck:
            test: ["CMD", "pg_isready"]
            interval: 3s
            retries: 10
        tests:
          build: .
          depends_on:
            db: { condition: service_healthy }
          environment: { DB_URL: postgresql://postgres:pw@db:5432/postgres }
          volumes: ["./reports:/reports"]
          command: pytest --junitxml=/reports/junit.xml
      ```
    hint: depends_on.condition + volume.
    explanation: Healthcheck-gated start + report extraction. See [[#Docker Compose
      for Test Env]].
  - id: dft-t003
    type: fill_blank
    q: 'Fill: Auto-clean dangling resources older than 24h in CI = `docker system
      prune -af --filter "______=24h"`.'
    answer: until
    hint: Time filter.
    explanation: Removes unused images/containers older than threshold. See
      [[#Cleanup Strategies]].
