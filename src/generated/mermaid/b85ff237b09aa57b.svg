tern-solid edge-thickness-normal edge-pattern-solid flowchart-link" style=";" data-edge="true" data-et="edge" data-id="L_BDD_TDD_0" data-points="W3sieCI6MTM4LCJ5Ijo2NzB9LHsieCI6MTM4LCJ5Ijo3MTl9LHsieCI6MTM4LCJ5Ijo3Njh9XQ==" data-look="classic" marker-end="url(#mb85ff237b09aa57b-0_flowchart-v2-pointEnd)"/></g><g class="edgeLabels"><g class="edgeLabel" transform="translate(138, 327)"><g class="label" data-id="L_ATDD_BDD_0" transform="translate(-100, -24)"><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel"><p>ATDD examples become BDD scenarios</p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(138, 719)"><g class="label" data-id="L_BDD_TDD_0" transform="translate(-100, -24)"><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel"><p>BDD examples become TDD red tests</p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default" id="mb85ff237b09aa57b-0-flowchart-ATDD-0" data-look="classic" transform="translate(138, 143)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>ATDD / Specification by Example<br />Audience: Business + Team<br />Artefact: Executable specification<br />'What does DONE look like? Give me an example.'<br />Rule + Examples → Automate → Living Documentation</p></span></div></foreignObject></g></g><g class="node default" id="mb85ff237b09aa57b-0-flowchart-BDD-1" data-look="classic" transform="translate(138, 523)"><rect class="basic label-container" style="" x="-130" y="-147" width="260" height="294"/><g class="label" style="" transform="translate(-100, -132)"><rect/><foreignObject width="200" height="264"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>BDD — Behaviour-Driven Development<br />Audience: Dev + QA + Business<br />Artefact: Three-amigos conversation<br />'Walk me through a concrete example.'<br />Three-amigos meeting → Concrete examples → .feature file</p></span></div></foreignObject></g></g><g class="node default" id="mb85ff237b09aa57b-0-flowchart-TDD-2" data-look="classic" transform="translate(138, 891)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>TDD — Test-Driven Development<br />Audience: Developer<br />Artefact: Red-green-refactor loop<br />'Write the test first, make it pass, improve the design.'<br />RED → GREEN → REFACTOR → repeat</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="mb85ff237b09aa57b-0-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="mb85ff237b09aa57b-0-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><linearGradient id="mb85ff237b09aa57b-0-gradient" gradientUnits="objectBoundingBox" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(0, 0%, 83.3333333333%)" stop-opacity="1"/><stop offset="100%" stop-color="hsl(0, 0%, 88.9215686275%)" stop-opacity="1"/></linearGradient></svg>