name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Run the visual job with --update-snapshots and upload regenerated PNGs as artifact (deliberate baseline update — see CONTRIBUTING.md).'
        type: boolean
        default: false

# ─── STAGE OVERVIEW ──────────────────────────────────────────────────────────
#
#  Stage 1 — fast checks (parallel, no DB, no browser)
#    lint-typecheck   npx astro check
#    unit             vitest unit suite
#
#  Stage 2 — integration (needs Stage 1 green)
#    integration      vitest integration suite against real Postgres
#
#  Stage 3 — heavy gates (parallel, all need Stage 2 green)
#    e2e-a11y         Playwright E2E + axe-core a11y assertions
#    visual           Playwright visual regression (non-blocking while UI churns)
#    lhci             Lighthouse-CI budget gate (mobile + desktop)
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Stage 1a: type-check ──────────────────────────────────────────────────
  lint-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Type check (astro check)
        run: npx astro check

  # ── Stage 1b: unit tests ──────────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Unit tests
        run: npm test

  # ── Stage 2: integration tests ────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qa_learning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/qa_learning_test
      BETTER_AUTH_SECRET: test-secret-at-least-32-bytes-long-aaaaaaaaa
      BETTER_AUTH_URL: http://localhost:4321
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Apply DB migrations
        run: npx drizzle-kit migrate

      - name: Integration tests
        run: npm run test:integration

  # ── Stage 3a: E2E + a11y ──────────────────────────────────────────────────
  e2e-a11y:
    runs-on: ubuntu-latest
    needs: integration

    env:
      BETTER_AUTH_SECRET: test-secret-at-least-32-bytes-long-aaaaaaaaa
      BETTER_AUTH_URL: http://localhost:4321
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E + a11y tests
        env:
          E2E_OAUTH_MOCK: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Stage 3b: visual regression ───────────────────────────────────────────
  visual:
    # Linux only — cross-OS font rendering produces diffs that are impossible
    # to manage. Baselines live in CI exclusively; see CONTRIBUTING.md for the
    # deliberate baseline-update workflow (workflow_dispatch → update_visual_baselines).
    #
    # Non-blocking (continue-on-error) while the design system rollout is in
    # progress. Re-enable as a hard gate once the UI stabilises. Diffs are
    # still uploaded as artifacts for manual review. See commit af4889d.
    runs-on: ubuntu-latest
    needs: integration
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Visual regression tests
        if: ${{ inputs.update_visual_baselines != true }}
        run: npm run test:visual

      - name: Regenerate baselines (deliberate)
        if: ${{ inputs.update_visual_baselines == true }}
        run: npm run test:visual:update

      - name: Upload regenerated baselines artifact
        if: ${{ inputs.update_visual_baselines == true }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/**/*-snapshots/**
          retention-days: 14

      - name: Upload visual report
        if: always() && inputs.update_visual_baselines != true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-visual-report/
            test-results/
          retention-days: 14

  # ── Stage 3c: Lighthouse-CI budget gate ───────────────────────────────────
  lhci:
    # Audits static pages from `dist/client/` against score budgets.
    # SSR routes (prerender:false) are not audited here — the Vercel adapter
    # does not implement `astro preview`; auditing them requires a live preview
    # deployment URL (tracked as a follow-up issue).
    runs-on: ubuntu-latest
    needs: integration
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Serve dist/client
        run: npx --yes serve dist/client -l 4321 --no-clipboard > serve.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4321/ > /dev/null && echo "ready" && exit 0
            sleep 2
          done
          echo "static server did not start within 60s" >&2
          cat serve.log >&2 || true
          exit 1

      - name: Lighthouse-CI (mobile)
        run: npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.json

      - name: Lighthouse-CI (desktop)
        if: always()
        run: npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.desktop.json

      - name: Comment Lighthouse report links on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.lighthouseci/links.json';
            if (!fs.existsSync(path)) {
              core.info('No links.json — lhci upload step did not run.');
              return;
            }
            const links = JSON.parse(fs.readFileSync(path, 'utf8'));
            const lines = Object.entries(links).map(
              ([url, report]) => `- [\`${url}\`](${report})`
            );
            const body = [
              '### Lighthouse-CI reports',
              '',
              ...lines,
              '',
              '_Budgets (current floor): perf ≥ 90 mobile / 95 desktop · a11y ≥ 95 · SEO ≥ 95 · best-practices ≥ 95._',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload .lighthouseci artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: .lighthouseci/
          retention-days: 14
