lesson: contract-testing
questions:
  - id: ct-001
    type: single
    q: "Contract testing primarily verifies:"
    options:
      - A) UI rendering
      - B) Agreement on API shape between consumer and provider
      - C) Database indexes
      - D) Pixel layout
    answer: 1
    hint: Two services, one expectation.
    explanation: Contract test pins request/response shape between services. See
      [[#What & Why]].
  - id: ct-002
    type: single
    q: "CDCT stands for:"
    options:
      - A) Continuous Delivery Contract Test
      - B) Consumer-Driven Contract Testing
      - C) Cloud Distributed Contract Tool
      - D) Concurrent Data Contract Type
    answer: 1
    hint: Consumer writes first.
    explanation: CDCT = consumer expectations drive contract. See [[#Consumer-Driven
      Contract Testing (CDCT)]].
  - id: ct-003
    type: single
    q: "Pact Broker role:"
    options:
      - A) Run UI tests
      - B) Store + version contracts and gate deploys
      - C) Generate code
      - D) Lint code
    answer: 1
    hint: Central exchange.
    explanation: Broker stores pacts, tags, runs `can-i-deploy`. See [[#Pact Workflow]].
  - id: ct-004
    type: single
    q: "`can-i-deploy` checks:"
    options:
      - A) Disk space
      - B) Whether consumer + provider versions are compatible in target env
      - C) CPU usage
      - D) Lint score
    answer: 1
    hint: Pre-deploy gate.
    explanation: Queries broker for compatible version pair. See [[#Versioning &
      Compatibility]].
  - id: ct-005
    type: single
    q: "Pact `like()` matcher purpose:"
    options:
      - A) Exact string match
      - B) Match by type, not exact value
      - C) Regex only
      - D) Skip field
    answer: 1
    hint: Tolerant to data drift.
    explanation: Type matchers keep shape strict, value tolerant. See [[#Pact
      Example (Consumer side, JS)]].
  - id: ct-006
    type: single
    q: "Provider verification step:"
    options:
      - A) Mocks consumer
      - B) Replays consumer pact requests against real provider, asserts
        responses
      - C) Generates new pact
      - D) Runs lint
    answer: 1
    hint: Real provider runs.
    explanation: Provider boots, state handler seeds, runner replays. See
      [[#Provider Verification]].
  - id: ct-007
    type: single
    q: "State handler in Pact provider test:"
    options:
      - A) Cleans logs
      - B) Seeds preconditions for `given(...)` clauses
      - C) Mocks DB
      - D) Verifies UI
    answer: 1
    hint: Make `given` true.
    explanation: Handler ensures provider state matches consumer `given`. See
      [[#Provider Verification]].
  - id: ct-008
    type: single
    q: "gRPC contract source of truth:"
    options:
      - A) Postman collection
      - B) Protobuf schema
      - C) OpenAPI YAML
      - D) GraphQL schema
    answer: 1
    hint: "`.proto` file."
    explanation: Protobuf defines messages + RPCs for gRPC. See [[#Schema-Based
      Alternatives]].
  - id: ct-009
    type: single
    q: "AsyncAPI describes:"
    options:
      - A) Sync REST
      - B) Async / event-driven contracts (Kafka, AMQP)
      - C) UI specs
      - D) Build pipelines
    answer: 1
    hint: Messaging.
    explanation: AsyncAPI is OpenAPI-equivalent for events. See [[#Schema-Based
      Alternatives]].
  - id: ct-010
    type: single
    q: "Bi-directional contract testing avoids:"
    options:
      - A) Pact broker
      - B) Provider replay step (compares pact vs OpenAPI directly)
      - C) Consumer test
      - D) Versioning
    answer: 1
    hint: No live verify.
    explanation: Pactflow compares contracts; faster but less dynamic. See
      [[#Bi-Directional Contract Testing (Pactflow)]].
  - id: ct-011
    type: single
    q: "Contract tests sit where in pyramid:"
    options:
      - A) Below unit
      - B) Between integration and E2E
      - C) Above E2E
      - D) Outside pyramid
    answer: 1
    hint: Cross-service shape.
    explanation: Faster than E2E, broader than integration. See [[#Where Contract
      Tests Fit]].
  - id: ct-012
    type: single
    q: "Schemathesis generates tests from:"
    options:
      - A) Random text
      - B) OpenAPI / GraphQL schema (property-based)
      - C) UI screenshots
      - D) Logs
    answer: 1
    hint: Property-based.
    explanation: Schemathesis fuzzes endpoints per schema rules. See [[#Tools]].
  - id: ct-013
    type: single
    q: "Provider-driven contracts good for:"
    options:
      - A) One consumer
      - B) Public API with many unknown consumers
      - C) UI tests
      - D) Load tests
    answer: 1
    hint: Provider publishes spec.
    explanation: Provider sets canonical schema; consumers conform. See
      [[#Provider-Driven Contracts]].
  - id: ct-014
    type: single
    q: "Pact `eachLike()` matcher:"
    options:
      - A) Exact array
      - B) Array where each element matches given shape
      - C) Empty array
      - D) Single null
    answer: 1
    hint: Repeat shape.
    explanation: '`eachLike` says "any number of items, each matching this
      template". See [[#Pact Example (Consumer side, JS)]].'
  - id: ct-015
    type: single
    q: "Contract test does NOT replace:"
    options:
      - A) Cross-service E2E shape checks
      - B) Behavioral / business-flow E2E tests
      - C) Provider unit tests on shape
      - D) Consumer expectation
    answer: 1
    hint: Shape vs behavior.
    explanation: Contracts pin shape only â€” flow scenarios still need E2E. See
      [[#Pitfalls]].
  - id: ct-016
    type: single
    q: "Spring Cloud Contract specialty:"
    options:
      - A) Python REST
      - B) JVM stubs generated from contracts
      - C) GraphQL diff
      - D) Mobile
    answer: 1
    hint: Spring ecosystem.
    explanation: Generates server-side tests + client-side stubs from contract DSL.
      See [[#Tools]].
  - id: ct-017
    type: single
    q: "Protobuf backward-compat rule:"
    options:
      - A) Renumber fields freely
      - B) Don't reuse / renumber field tags; new fields must be optional
      - C) Delete fields anytime
      - D) Rename messages freely
    answer: 1
    hint: Tag stability.
    explanation: Wire format keyed by tag; reuse breaks old clients. See
      [[#Schema-Based Alternatives]].
  - id: ct-018
    type: single
    q: "Pact tags use:"
    options:
      - A) Decoration
      - B) Mark contract version with branch / env (e.g. `prod`)
      - C) UI label
      - D) Logging
    answer: 1
    hint: Versioning.
    explanation: Tags drive `can-i-deploy` queries. See [[#Versioning & Compatibility]].
  - id: ct-019
    type: single
    q: "Anti-pattern in pact assertions:"
    options:
      - A) Using type matchers
      - B) Asserting exact dynamic values (timestamps, generated IDs)
      - C) Using `eachLike`
      - D) Setting state handlers
    answer: 1
    hint: Brittle.
    explanation: Exact values on dynamic fields cause flake. Use matchers. See
      [[#Pitfalls]].
  - id: ct-020
    type: single
    q: "Dredd validates:"
    options:
      - A) Tests vs spec
      - B) Live API responses against OpenAPI spec
      - C) UI vs design
      - D) DB schema
    answer: 1
    hint: OpenAPI validator.
    explanation: |-
      Dredd hits endpoints, asserts responses match OpenAPI. See [[#Tools]].

      ---
