lesson: bash-shell-for-qa
questions:
  - id: bsfq-001
    type: single
    q: "`set -euo pipefail` benefit:"
    options:
      - A) Faster scripts
      - B) Fail loudly on errors, undef vars, pipe failures
      - C) Disables errors
      - D) Required for Bash
    answer: 1
    hint: Strict mode.
    explanation: Surfaces silent failures early. See [[#Script Boilerplate]].
  - id: bsfq-002
    type: single
    q: 'Why quote `"$var"`:'
    options:
      - A) Style only
      - B) Prevents word splitting and globbing
      - C) Faster
      - D) Required syntax
    answer: 1
    hint: Word-splitting trap.
    explanation: Unquoted vars with spaces / `*` cause subtle bugs. See [[#Variables
      + Quoting]].
  - id: bsfq-003
    type: single
    q: "Numeric compare in `[[ ... ]]`:"
    options:
      - A) `==`
      - B) `-eq`
      - C) `=`
      - D) `is`
    answer: 1
    hint: -eq -ne -gt etc.
    explanation: "`==` is string compare; `-eq` is numeric. See [[#Conditionals]]."
  - id: bsfq-004
    type: single
    q: "Append to file:"
    options:
      - A) `>`
      - B) `>>`
      - C) `<`
      - D) `|`
    answer: 1
    hint: Double arrow.
    explanation: "`>` overwrites; `>>` appends. See [[#Pipes + Redirection]]."
  - id: bsfq-005
    type: single
    q: "Redirect stderr to stdout:"
    options:
      - A) `2>&1`
      - B) `1>&2`
      - C) `&2>1`
      - D) `2>1`
    answer: 0
    hint: Merge order.
    explanation: Sends fd2 to wherever fd1 currently points. See [[#Pipes + Redirection]].
  - id: bsfq-006
    type: single
    q: "`jq -r '.status'` extracts:"
    options:
      - A) Raw status field value
      - B) JSON object
      - C) Stderr
      - D) Schema
    answer: 0
    hint: -r raw output.
    explanation: Strips quotes for piping into shell. See [[#QA Patterns]].
  - id: bsfq-007
    type: single
    q: "`until curl -sf URL; do sleep 2; done` purpose:"
    options:
      - A) Endless loop
      - B) Wait for service to become healthy
      - C) Spam server
      - D) Cron job
    answer: 1
    hint: Poll readiness.
    explanation: Loops until URL returns success. See [[#QA Patterns]].
  - id: bsfq-008
    type: single
    q: "`xargs -I{}` purpose:"
    options:
      - A) Sleep
      - B) Replace `{}` per input line in command
      - C) Compress
      - D) Sort
    answer: 1
    hint: Placeholder.
    explanation: Lets `xargs` build per-item commands. See [[#Coreutils Cheat Sheet]].
  - id: bsfq-009
    type: single
    q: "`find . -name '*.log' -mtime -1`:"
    options:
      - A) Logs over 1 day old
      - B) Logs modified in last 1 day
      - C) Logs of size 1
      - D) Empty logs
    answer: 1
    hint: Negative mtime = recent.
    explanation: "`-mtime -N` matches modified within N days. See [[#Coreutils Cheat
      Sheet]]."
  - id: bsfq-010
    type: single
    q: "Default if env unset: `${PORT:-8080}` returns:"
    options:
      - A) Empty
      - B) 8080 if PORT unset
      - C) Always 8080
      - D) Errors
    answer: 1
    hint: "`:-` default."
    explanation: Doesn't assign; just defaults the expansion. See [[#Env Vars + Args]].
  - id: bsfq-011
    type: single
    q: "`set -x` enables:"
    options:
      - A) Strict mode
      - B) Trace each command before exec
      - C) Encrypts
      - D) Subshell
    answer: 1
    hint: Debug flag.
    explanation: Useful for diagnosing scripts in CI. See [[#Debugging]].
  - id: bsfq-012
    type: single
    q: "ShellCheck does:"
    options:
      - A) Run scripts faster
      - B) Static analysis on shell scripts
      - C) Format only
      - D) Compile
    answer: 1
    hint: Linter.
    explanation: Catches quoting, unset var, portability bugs. See [[#Debugging]].
  - id: bsfq-013
    type: single
    q: "`command1 && command2`:"
    options:
      - A) Always run both
      - B) Run command2 only if command1 succeeds
      - C) Background
      - D) Pipe
    answer: 1
    hint: Logical AND on exit code.
    explanation: Short-circuits on failure. See [[#Exit Codes]].
  - id: bsfq-014
    type: single
    q: "`$?` holds:"
    options:
      - A) PID
      - B) Last command exit code
      - C) Script name
      - D) Arg count
    answer: 1
    hint: Status.
    explanation: Inspect after a command to branch. See [[#Exit Codes]].
  - id: bsfq-015
    type: single
    q: "Heredoc with `<<'EOF'` differs from `<<EOF`:"
    options:
      - A) Same
      - B) Single-quoted prevents variable expansion
      - C) Faster
      - D) Tabs allowed
    answer: 1
    hint: Literal heredoc.
    explanation: Use when you want `$var` to stay literal. See [[#Heredocs]].
  - id: bsfq-016
    type: single
    q: "POSIX `[ ... ]` vs Bash `[[ ... ]]`:"
    options:
      - A) Same
      - B) `[[ ]]` supports `&&`, regex, no word split
      - C) `[ ]` faster always
      - D) `[[ ]]` deprecated
    answer: 1
    hint: Bash extended test.
    explanation: Safer + more features inside `[[ ]]`. See [[#Common Bugs]].
  - id: bsfq-017
    type: single
    q: "Iterate lines from file safely:"
    options:
      - A) `for l in $(cat f)`
      - B) `while IFS= read -r line; do ...; done < f`
      - C) `cat f | for ...`
      - D) `awk file`
    answer: 1
    hint: Avoid word split.
    explanation: "`for $(cat)` splits on whitespace; `read -r` preserves lines. See
      [[#Loops]]."
  - id: bsfq-018
    type: single
    q: "`tail -F`:"
    options:
      - A) Same as `tail -f`
      - B) Follows file, retries on rotation/recreate
      - C) Backwards
      - D) Forces flush
    answer: 1
    hint: Capital F = robust follow.
    explanation: Survives log rotation. See [[#QA Patterns]].
  - id: bsfq-019
    type: single
    q: "`trap '...' ERR` purpose:"
    options:
      - A) Cron schedule
      - B) Run handler on script error
      - C) Disable errors
      - D) Network tap
    answer: 1
    hint: Error hook.
    explanation: Useful for cleanup or logging on failure. See [[#Script Boilerplate]].
  - id: bsfq-020
    type: single
    q: "`curl -fsSL URL` flags meaning:"
    options:
      - A) Verbose only
      - B) Fail on HTTP error, silent, show errors, follow redirects
      - C) Fast cache
      - D) HTTPS only
    answer: 1
    hint: Robust download recipe.
    explanation: |-
      Common idiom for scripts. See [[#Coreutils Cheat Sheet]].

      ---
