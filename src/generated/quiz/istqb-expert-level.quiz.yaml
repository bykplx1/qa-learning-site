lesson: istqb-expert-level
questions:
  - id: iel-001
    type: single
    q: "CTEL-TM Strategic vs Operational:"
    options:
      - A) Same
      - B) Strategic = exec/policy; Operational = programme/multi-project
        execution
      - C) Operational is exec
      - D) Strategic ignores budget
    answer: 1
    hint: Exec vs programme.
    explanation: Two complementary streams. See [[#Streams]].
  - id: iel-002
    type: single
    q: "TMMi level 2 name:"
    options:
      - A) Defined
      - B) Managed
      - C) Initial
      - D) Measured
    answer: 1
    hint: Bottom-up second.
    explanation: "Levels: Initial, Managed, Defined, Measured, Optimization. See
      [[#TMMi (Test Maturity Model integration)]]."
  - id: iel-003
    type: single
    q: "IDEAL cycle order:"
    options:
      - A) Diagnose → Initiate → Establish → Act → Learn
      - B) Initiate → Diagnose → Establish → Act → Learn
      - C) Establish → Initiate → Act → Diagnose → Learn
      - D) Initiate → Act → Establish → Diagnose → Learn
    answer: 1
    hint: I-D-E-A-L.
    explanation: Standard SEI improvement cycle. See [[#Approach (IDEAL Cycle)]].
  - id: iel-004
    type: single
    q: "TPI Next key areas count:"
    options:
      - A) 4
      - B) 8
      - C) 16
      - D) 32
    answer: 2
    hint: Maturity matrix.
    explanation: TPI Next has 16 key areas. See [[#TPI Next]].
  - id: iel-005
    type: single
    q: "ISO 27001 covers:"
    options:
      - A) Testing
      - B) Information security mgmt
      - C) Quality model
      - D) Lifecycle
    answer: 1
    hint: ISMS.
    explanation: ISMS standard. See [[#Standards Used at Expert]].
  - id: iel-006
    type: single
    q: "DORA metric NOT include:"
    options:
      - A) Deploy frequency
      - B) Lead time for changes
      - C) MTTR
      - D) Defect density
    answer: 3
    hint: Defect density is product metric.
    explanation: "DORA: deploy freq, lead time, MTTR, change-fail rate. See
      [[#Adjacent Frameworks]]."
  - id: iel-007
    type: single
    q: "Best framework for test process improvement with maturity levels:"
    options:
      - A) ITIL
      - B) TMMi
      - C) COBIT
      - D) DORA
    answer: 1
    hint: Test-specific maturity.
    explanation: TMMi mirrors CMMI for testing. See [[#TMMi (Test Maturity Model
      integration)]].
  - id: iel-008
    type: single
    q: "CTP framework character:"
    options:
      - A) Heavy governance
      - B) Practitioner-driven, 12 critical processes
      - C) Auditor-only
      - D) Tool-driven
    answer: 1
    hint: Pragmatic.
    explanation: CTP = Critical Testing Processes. See [[#CTP (Critical Testing
      Processes)]].
  - id: iel-009
    type: single
    q: "Crisis mgmt example at operational expert level:"
    options:
      - A) Hiring intern
      - B) Release rollback decision in prod incident
      - C) Daily standup
      - D) Sprint planning
    answer: 1
    hint: High-stakes call.
    explanation: Operational TM owns crises. See [[#CTEL-TM Operational]].
  - id: iel-010
    type: single
    q: "Test policy owner:"
    options:
      - A) Junior tester
      - B) Head of QA / CIO
      - C) Tester
      - D) Project mgr
    answer: 1
    hint: Org-level.
    explanation: Strategic artefact. See [[#CTEL-TM Strategic]].
  - id: iel-011
    type: single
    q: "ROI communication best metric:"
    options:
      - A) Lines of test code
      - B) Business metric (uptime, revenue protected, NPS)
      - C) Test count
      - D) Tool license cost
    answer: 1
    hint: Speak exec.
    explanation: Business outcomes resonate. See [[#ROI of Improvement]].
  - id: iel-012
    type: single
    q: "Reassessment cadence after improvement roll-out:"
    options:
      - A) 1 mo
      - B) 12–18 mo typically
      - C) 5 yr
      - D) Never
    answer: 1
    hint: Time for change to land.
    explanation: Standard cadence. See [[#Assessment Process]].
  - id: iel-013
    type: single
    q: "TMMi level 5:"
    options:
      - A) Managed
      - B) Defined
      - C) Measured
      - D) Optimization
    answer: 3
    hint: Top.
    explanation: Optimization is L5. See [[#TMMi (Test Maturity Model integration)]].
  - id: iel-014
    type: single
    q: "CTEL prereq:"
    options:
      - A) None
      - B) Relevant CTAL + 5 yr exp + assignment + exam
      - C) CTFL only
      - D) Degree
    answer: 1
    hint: Multiple gates.
    explanation: Highest tier requires depth. See top of file.
  - id: iel-015
    type: single
    q: "STEP framework attribute:"
    options:
      - A) Agile-only
      - B) IEEE-aligned, reqs-based, lifecycle-spanning
      - C) UI-only
      - D) Tool
    answer: 1
    hint: Systematic Test and Evaluation Process.
    explanation: STEP definition. See [[#STEP (Systematic Test and Evaluation Process)]].
  - id: iel-016
    type: single
    q: "Sustaining improvement post-consultancy depends on:"
    options:
      - A) Tool licenses
      - B) Institutionalization (training, ownership, process integration)
      - C) Reassessment fee
      - D) Exec speeches
    answer: 1
    hint: Make it stick.
    explanation: Institutionalize avoids regression. See [[#Challenges at Expert Level]].
  - id: iel-017
    type: single
    q: "Vendor scorecard purpose:"
    options:
      - A) Marketing
      - B) Quantify supplier performance + drive accountability
      - C) Audit trail only
      - D) Random ranking
    answer: 1
    hint: Supplier KPI.
    explanation: Operational TM tool. See [[#CTEL-TM Operational]].
  - id: iel-018
    type: single
    q: "ISO 26262 industry:"
    options:
      - A) Pharma
      - B) Automotive functional safety
      - C) Banking
      - D) Avionics
    answer: 1
    hint: Automotive.
    explanation: Functional safety standard. See [[#Standards Used at Expert]].
  - id: iel-019
    type: single
    q: "Defect prevention practiced strongly at TMMi level:"
    options:
      - A) 1
      - B) 2
      - C) 3
      - D) 5
    answer: 3
    hint: Optimization.
    explanation: L5 process areas include defect prevention. See [[#TMMi (Test
      Maturity Model integration)]].
  - id: iel-020
    type: single
    q: "SPACE framework measures:"
    options:
      - A) Test maturity
      - B) Engineering productivity (Satisfaction, Performance, Activity,
        Communication, Efficiency)
      - C) Risk
      - D) Coverage
    answer: 1
    hint: Productivity model.
    explanation: |-
      SPACE complement to DORA. See [[#Adjacent Frameworks]].

      ---
