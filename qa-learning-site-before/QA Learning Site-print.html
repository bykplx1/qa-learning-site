<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Learning Site — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  .page {
    width: 1280px;
    margin: 24px auto;
    background: #f0eee9;
    box-shadow: 0 8px 32px -10px rgba(0,0,0,0.12);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .page__label {
    position: absolute;
    top: -24px;
    left: 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: rgba(60,50,40,0.7);
    letter-spacing: 0.06em;
  }
  .page__inner { width: 1280px; }

  @page {
    size: 1280px auto;
    margin: 0;
  }

  @media print {
    html, body { background: white; }
    .page {
      margin: 0;
      box-shadow: none;
      border-radius: 0;
      break-inside: avoid;
      break-after: page;
      page-break-after: always;
    }
    .page:last-child { break-after: auto; page-break-after: auto; }
    .page__label { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="extras.jsx"></script>

<script type="text/babel" data-presets="react">
const PAGES = [
  { id: "home",         label: "01 · Home / curriculum index",       Comp: Home,         h: 1480 },
  { id: "search",       label: "02 · ⌘K search · Pagefind",          Comp: SearchOverlay, h: 820 },
  { id: "lesson",       label: "03 · Lesson · Testing Principles",   Comp: Lesson,       h: 1320 },
  { id: "quiz",         label: "04 · Practice quiz · mid-attempt",   Comp: Quiz,         h: 1100 },
  { id: "exam",         label: "05 · Exam mode · timed · dark",      Comp: Exam,         h: 820  },
  { id: "exam-summary", label: "06 · Exam summary · post-submit",    Comp: ExamSummary,  h: 1480 },
  { id: "profile",      label: "07 · Profile · /me",                 Comp: Profile,      h: 1320 },
  { id: "build",        label: "08 · Build · project briefs",        Comp: Build,        h: 1500 },
];

function PrintApp() {
  return (
    <div>
      {PAGES.map(({ id, label, Comp, h }) => (
        <div key={id} className="page" style={{ height: h }}>
          <div className="page__label">{label}</div>
          <div className="page__inner" style={{ height: h }}>
            <Comp/>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

// Auto-print: wait for fonts + Babel-transformed scripts + a small buffer
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  // Allow React commit + layout to settle
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>
</body>
</html>
