lesson: shift-left-right
tasks:
  - id: slr-t001
    type: fill_blank
    q: "Fill: Releasing to a small subset of users first to limit blast radius is a
      _______ release."
    answer: canary
    hint: Coal mine bird.
    explanation: A canary release catches issues in a narrow user slice before full rollout, limiting blast radius.
  - id: slr-t002
    type: fill_blank
    q: "Task: Team only tests after dev-complete. Suggest 3 shift-left actions."
    answer: |-
      - Add three-amigos review of acceptance criteria pre-sprint.
      - Add unit + lint + type-check gates in pre-merge CI.
      - Adopt TDD or BDD for new features; tests authored with code.
    hint: Earlier collaboration + automation.
    explanation: Shift-left practices (three-amigos, pre-merge CI, TDD) detect defects earlier, lowering cost per the cost-of-defect curve.
  - id: slr-t003
    type: fill_blank
    q: "Fill: Scripted probes that continuously hit production endpoints to detect
      outages are called _______ monitoring."
    answer: synthetic
    hint: Not real users.
    explanation: Synthetic monitoring validates uptime and SLO from outside the system using scripted probes, not real user traffic.
