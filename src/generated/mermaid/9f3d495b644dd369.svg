ta-look="classic" transform="translate(175.5, 142)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>BrowserStack App Automate · Sauce Labs · AWS Device Farm<br />Firebase Test Lab · LambdaTest<br />Cost: real but smaller than 'we ship and find out'</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(385, 100)"><g class="clusters"><g class="cluster" id="m9f3d495b644dd369-0-ET" data-look="classic"><rect style="" x="8" y="8" width="335" height="636"/><g class="cluster-label" transform="translate(116.0546875, 8)"><foreignObject width="118.890625" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Execution Target</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m9f3d495b644dd369-0-flowchart-EMU-3" data-look="classic" transform="translate(175.5, 166)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Emulator / Simulator<br />Fast, cheap<br />No real sensors / hardware<br />Lossless network, perfect rendering<br />Misses long-tail Android OEM quirks<br />→ Use for fast PR feedback loops</p></span></div></foreignObject></g></g><g class="node default" id="m9f3d495b644dd369-0-flowchart-DEV-4" data-look="classic" transform="translate(175.5, 474)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Real Device<br />Slow, expensive<br />True hardware — sensors, haptics, camera<br />OEM overlays (One UI, MIUI, EMUI)<br />Catches what emulator hides<br />→ Use for pre-deploy sanity + weekly sweep</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(770, 0)"><g class="clusters"><g class="cluster" id="m9f3d495b644dd369-0-TF" data-look="classic"><rect style="" x="8" y="8" width="335" height="836"/><g class="cluster-label" transform="translate(118.140625, 8)"><foreignObject width="114.71875" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel"><p>Tooling Families</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="m9f3d495b644dd369-0-flowchart-APP-0" data-look="classic" transform="translate(175.5, 166)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"/><g class="label" style="" transform="translate(-100, -108)"><rect/><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Appium<br />Protocol: WebDriver (UIAutomator2 / XCUITest)<br />Languages: JS · Java · Python · C# · Ruby<br />Sweet spot: cross-platform, QA-team-owned<br />Cross-platform: Yes — leaks on system UI</p></span></div></foreignObject></g></g><g class="node default" id=