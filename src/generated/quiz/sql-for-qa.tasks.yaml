lesson: sql-for-qa
tasks:
  - id: sfq-t001
    type: fill_blank
    q: "Fill: Clause that filters groups after aggregation is `______`."
    answer: HAVING
    hint: Post-GROUP BY.
    explanation: WHERE can't reference aggregates. See [[#Aggregates]].
  - id: sfq-t002
    type: fill_blank
    q: "Task: Write SQL to find users created in last 7 days, ordered newest first."
    answer: |-
      ```sql
      SELECT id, email, created_at
      FROM users
      WHERE created_at >= NOW() - INTERVAL '7 days'
      ORDER BY created_at DESC;
      ```
    hint: Date math + ORDER BY.
    explanation: Common QA query for recency checks. See [[#Useful Snippets]].
  - id: sfq-t003
    type: fill_blank
    q: "Fill: Set operator returning rows in A but not B is `______`."
    answer: EXCEPT (or MINUS in Oracle)
    hint: Difference.
    explanation: Used for diffing datasets. See [[#QA-Specific Patterns]].
