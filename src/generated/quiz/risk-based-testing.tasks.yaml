lesson: risk-based-testing
tasks:
  - id: rbt-t001
    type: fill_blank
    q: "Fill: Risk score is computed as likelihood _____ impact."
    answer: ×  (multiplied by)
    hint: Product not sum.
    explanation: Risk = Likelihood × Impact; multiplication amplifies items that score high on both axes.
  - id: rbt-t002
    type: fill_blank
    q: "Task: For a banking transfer feature, list 3 product risks and rate each (L,
      I, score on 1–5 scale)."
    answer: |-
      - Wrong-account credit due to ID mismatch — L=3, I=5, score 15 (critical)
      - Duplicate transfer on retry — L=4, I=5, score 20 (critical)
      - UI rounding shows wrong fee — L=2, I=2, score 4 (low)
    hint: Money + correctness drive impact.
    explanation: A scored risk matrix turns qualitative gut-feel into concrete prioritisation decisions for coverage.
  - id: rbt-t003
    type: fill_blank
    q: "Fill: Risks affecting schedule, staffing, or environment are called _______
      risks."
    answer: project
    hint: Not in product code.
    explanation: Project risks (staffing, schedule, environment) live outside the product code but directly threaten delivery.
