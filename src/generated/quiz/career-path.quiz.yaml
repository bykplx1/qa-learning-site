      - C) More variety
      - D) Promotion
    answer: 1
    hint: Skill ceiling.
    explanation: Auto-skills required at senior level now. See [[#Anti-Patterns]].
  - id: cp-019
    type: single
    q: "Quality Coach principle re data:"
    options:
      - A) Data gates releases
      - B) Use data to inform, not gatekeep
      - C) Avoid data
      - D) Data only for managers
    answer: 1
