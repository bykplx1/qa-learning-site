lesson: test-levels
tasks:
  - id: tl-t001
    type: fill_blank
    q: "Fill: A test that uses a fake lower module to test top components is _______
      integration."
    answer: Top-down (with stubs)
    hint: "Direction: high to low."
    explanation: Top-down integration starts at the top level and uses stubs for incomplete lower modules; drivers are used in bottom-up integration.
  - id: tl-t002
    type: fill_blank
    q: "Fill: An anti-pattern with many UI tests and few unit tests is called the
      _______."
    answer: Ice-cream cone (or inverted pyramid)
    hint: Dessert shape.
    explanation: The ice-cream cone (inverted pyramid) is a common mistake — many UI/manual tests on top, few unit tests at the bottom.
  - id: tl-t003
    type: fill_blank
    q: "Task: For a checkout feature, list one test you'd write at each level (unit,
      integration, system, acceptance)."
    answer: >-
      - Unit: `calculateTotal(items, taxRate)` returns correct sum

      - Integration: payment service â†’ order service writes to DB

      - System: end-to-end browser test "user adds items, pays, sees
      confirmation"

      - Acceptance: business user runs scenario "discount code applies correctly
      per policy"
    hint: Different scope each level.
    explanation: Each of the 4 levels (unit, integration, system, acceptance) targets a different scope; mapping to one feature shows coverage layering.
