lesson: cucumber-bdd
questions:
  - id: cb-001
    type: single
    q: "Gherkin keyword for precondition:"
    options:
      - A) When
      - B) Given
      - C) Then
      - D) But
    answer: 1
    hint: State setup.
    explanation: Given establishes context. See [[#Gherkin Syntax]].
  - id: cb-002
    type: single
    q: "`Scenario Outline` purpose:"
    options:
      - A) Skip
      - B) Data-driven via Examples table
      - C) Background
      - D) Group
    answer: 1
    hint: Table rows.
    explanation: Runs scenario per row. See [[#Gherkin Syntax]].
  - id: cb-003
    type: single
    q: "Background steps run:"
    options:
      - A) Once
      - B) Before each scenario in feature
      - C) After
      - D) On failure
    answer: 1
    hint: Per scenario.
    explanation: Common setup. See [[#Keywords]].
  - id: cb-004
    type: single
    q: 'Filter tag expression "smoke not wip":'
    options:
      - A) `--tags @smoke @wip`
      - B) `"@smoke and not @wip"`
      - C) `--tags=smoke-wip`
      - D) `--exclude wip`
    answer: 1
    hint: Boolean expression.
    explanation: Standard tag expression syntax. See [[#Tags + Filters]].
  - id: cb-005
    type: single
    q: "Cucumber expression `{string}`:"
    options:
      - A) Matches any chars
      - B) Matches quoted string param
      - C) Type
      - D) Skips
    answer: 1
    hint: Captures quotes.
    explanation: Built-in param type. See [[#Cucumber Expressions]].
  - id: cb-006
    type: single
    q: Java step deps glue =
    options:
      - A) URL
      - B) Package containing step definitions
      - C) Test class
      - D) jar
    answer: 1
    hint: Glue path.
    explanation: Tells Cucumber where to look for steps. See [[#Project Structure
      (Java/Maven)]].
  - id: cb-007
    type: single
    q: "Cucumber best step style:"
    options:
      - A) Imperative selectors
      - B) Declarative business intent
      - C) Pure SQL
      - D) Code-only
    answer: 1
    hint: Behavior, not impl.
    explanation: Robust to UI changes; readable. See [[#Best Practices]].
  - id: cb-008
    type: single
    q: "Sharing state between step classes (Java):"
    options:
      - A) Globals
      - B) PicoContainer / DI
      - C) Statics only
      - D) System property
    answer: 1
    hint: DI.
    explanation: Cucumber-jvm supports DI containers. See [[#World / Context (State
      Sharing)]].
  - id: cb-009
    type: single
    q: JS world =
    options:
      - A) Global var
      - B) Instance shared by step funcs in single scenario
      - C) Plugin
      - D) Reporter
    answer: 1
    hint: "`setWorldConstructor`."
    explanation: Per-scenario state container. See [[#World / Context (State Sharing)]].
  - id: cb-010
    type: single
    q: "Hook for screenshot on fail (Java):"
    options:
      - A) `@AfterStep` always
      - B) `@After` checking `Scenario.isFailed()`
      - C) Listener only
      - D) Manual
    answer: 1
    hint: Scenario param.
    explanation: Hook receives scenario object. See [[#Hooks]].
  - id: cb-011
    type: single
    q: "Cucumber output format html:"
    options:
      - A) `--report html`
      - B) `--format html:path` / `plugin html:`
      - C) Always default
      - D) None
    answer: 1
    hint: Plugin syntax.
    explanation: Configurable formatter. See [[#Reports]].
  - id: cb-012
    type: single
    q: "pytest-bdd binds via:"
    options:
      - A) Cucumber jar
      - B) `@given/@when/@then` decorators + `scenarios()` loader
      - C) Plain regex only
      - D) Class
    answer: 1
    hint: Decorators.
    explanation: pytest-bdd integrates pytest fixtures + Gherkin. See [[#Step
      Definitions (Python — pytest-bdd)]].
  - id: cb-013
    type: single
    q: "Anti-pattern in BDD:"
    options:
      - A) Three amigos
      - B) Step that mixes click + assert
      - C) Background
      - D) Tags
    answer: 1
    hint: Single responsibility.
    explanation: Steps should do one thing. See [[#Anti-patterns]].
  - id: cb-014
    type: single
    q: "Gherkin keyword for action:"
    options:
      - A) Given
      - B) When
      - C) Then
      - D) Examples
    answer: 1
    hint: Trigger.
    explanation: When = action. See [[#Keywords]].
  - id: cb-015
    type: single
    q: "Ambiguous step error cause:"
    options:
      - A) Network
      - B) Two step defs match same Gherkin line
      - C) Missing tag
      - D) Bad jar
    answer: 1
    hint: Regex overlap.
    explanation: Cucumber refuses ambiguity. See [[#Common Pitfalls]].
  - id: cb-016
    type: single
    q: Living documentation =
    options:
      - A) Wiki
      - B) Executable specs that stay current because they run as tests
      - C) Logs
      - D) Code comments
    answer: 1
    hint: Run as tests.
    explanation: Specs are tests; can't drift if green. See [[#BDD Quick Recap]].
  - id: cb-017
    type: single
    q: "Best practice scenario length:"
    options:
      - A) 30+ steps
      - B) ≤ ~7 steps
      - C) Always 1
      - D) None
    answer: 1
    hint: Readability.
    explanation: Long scenarios hide intent. See [[#Best Practices]].
  - id: cb-018
    type: single
    q: "Avoid testing through UI BDD when:"
    options:
      - A) Always
      - B) Logic can be unit/API tested faster lower in pyramid
      - C) Never
      - D) No backend
    answer: 1
    hint: Pyramid alignment.
    explanation: Push tests down for speed/stability. See [[#Best Practices]].
  - id: cb-019
    type: single
    q: "Tag tied to hook:"
    options:
      - A) `@Before("@api")` runs only for tagged scenarios
      - B) Tags do nothing for hooks
      - C) Tags only for runner
      - D) Plugin
    answer: 0
    hint: Conditional hook.
    explanation: Tag-aware hooks. See [[#Hooks]].
  - id: cb-020
    type: single
    q: "Best author of feature file:"
    options:
      - A) Ops only
      - "B) Co-authored: PM + Dev + QA (three amigos)"
      - C) Just QA
      - D) Dev solo
    answer: 1
    hint: BDD core.
    explanation: |-
      Shared understanding is the value. See [[#BDD Quick Recap]].

      ---
